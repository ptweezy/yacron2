name: docker

# Build the official multi-arch container image and publish it to GHCR (and, if
# the DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are set, to Docker Hub too).
#
#   - on a published GitHub Release: build linux/amd64 + linux/arm64 and push,
#     tagging the image with the release version and `latest`;
#   - manually (workflow_dispatch): (re)build any existing release tag — handy
#     to backfill an image for a release cut before this workflow existed;
#   - on pull requests / main pushes that touch the image: build only, without
#     pushing, so a broken Dockerfile fails CI before a release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. 1.0.4). Defaults to the latest release."
        type: string
        required: false
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - yacron2/**
      - .github/workflows/docker.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - yacron2/**
      - .github/workflows/docker.yml

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; the job opts up to packages:write for GHCR pushes.
permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR (only used on release / workflow_dispatch)
    steps:
      - name: Resolve build target
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version=""          # empty => Dockerfile reads the version from .git
          ref=""              # empty => checkout the default ref
          push=false
          platforms="linux/amd64"
          case "$EVENT" in
            release)
              version="$RELEASE_TAG"; ref="$RELEASE_TAG"
              push=true; platforms="linux/amd64,linux/arm64" ;;
            workflow_dispatch)
              if [ -n "${INPUT_TAG:-}" ]; then
                version="$INPUT_TAG"
              else
                version="$(gh release view --repo "$REPO" --json tagName -q .tagName)"
              fi
              ref="$version"
              push=true; platforms="linux/amd64,linux/arm64" ;;
          esac
          {
            echo "version=$version"
            echo "ref=$ref"
            echo "push=$push"
            echo "platforms=$platforms"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::event=$EVENT version=${version:-<git>} push=$push platforms=$platforms"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.target.outputs.ref }}
          fetch-depth: 0 # full history so setuptools_scm can resolve a version

      - name: Resolve registries
        id: registries
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          images="ghcr.io/${REPO,,}"   # GHCR image names must be lowercase
          dockerhub=false
          if [ -n "${DOCKERHUB_USERNAME:-}" ]; then
            images="${images}"$'\n'"docker.io/${DOCKERHUB_USERNAME}/yacron2"
            dockerhub=true
          fi
          {
            echo "dockerhub=$dockerhub"
            echo "images<<EOF"
            echo "$images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registries.outputs.images }}
          tags: |
            type=raw,value=${{ steps.target.outputs.version }},enable=${{ steps.target.outputs.version != '' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}
            type=raw,value=ci-build,enable=${{ steps.target.outputs.push == 'false' }}

      - name: Log in to GHCR
        if: steps.target.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: steps.target.outputs.push == 'true' && steps.registries.outputs.dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.target.outputs.platforms }}
          push: ${{ steps.target.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.target.outputs.version }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
