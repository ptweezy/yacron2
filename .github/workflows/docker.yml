name: docker

# Build the container image on EVERY commit (build-only, so a broken Dockerfile
# fails fast) and, when a release is cut, publish the multi-arch image to both
# GHCR and Docker Hub. (GHCR authenticates with the built-in GITHUB_TOKEN;
# Docker Hub uses the DOCKERHUB_* secrets and is skipped.)
#
#   - on a push to any branch: build linux/amd64 + linux/arm64 (arm64 via QEMU
#     emulation) and do NOT push -- a gate proving the image still builds for
#     BOTH release arches on every commit. arm64-under-QEMU is slow, but it
#     catches arm64-only breakage (e.g. a dep with no arm64 wheel) that an
#     amd64-only build would miss;
#   - on release: the release workflow CALLS this one (workflow_call) right after
#     it publishes, building linux/amd64 + linux/arm64 and pushing, tagged with
#     the release version and `latest`;
#   - manually (workflow_dispatch): (re)build and push any existing release tag --
#     handy to backfill an image for a release whose build was missed.
#
# Why workflow_call instead of `on: release`? A GitHub Release created by the
# release workflow's default GITHUB_TOKEN does NOT emit a `release: published`
# event capable of starting another workflow -- GitHub suppresses token-triggered
# events to avoid recursion. Having release.yml invoke this workflow directly
# makes the image a first-class step of the release instead of a trigger that
# silently never fires. (The per-commit build above is what catches a broken
# Dockerfile early, so building the image after publish is safe.)

on:
  workflow_call:
    inputs:
      version:
        description: "Release version/tag to build and push (e.g. 1.0.9)."
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. 1.0.4). Defaults to the latest release."
        type: string
        required: false
  push:
    branches: ["**"] # build on every commit, on every branch

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; the job opts up to packages:write for GHCR pushes.
permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR (only used on release / workflow_dispatch)
    steps:
      - name: Resolve build target
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          CALL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version=""          # empty => Dockerfile reads the version from .git
          ref=""              # empty => checkout the triggering ref
          push=false
          # Per-commit default: build both release arches (amd64 + arm64 via
          # QEMU) but never push -- a build-only gate at the same arch coverage
          # as the release image. The branches below opt up to push=true.
          platforms="linux/amd64,linux/arm64"
          if [ -n "${CALL_VERSION:-}" ]; then
            # Invoked by the release workflow (workflow_call): build + push at the
            # just-released version. Detected via the input, NOT github.event_name
            # -- in a called workflow that still reports the CALLER's event.
            version="$CALL_VERSION"; ref="$CALL_VERSION"
            push=true; platforms="linux/amd64,linux/arm64"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            # Manual (re)build of an existing release tag.
            if [ -n "${INPUT_TAG:-}" ]; then
              version="$INPUT_TAG"
            else
              version="$(gh release view --repo "$REPO" --json tagName -q .tagName)"
            fi
            ref="$version"
            push=true; platforms="linux/amd64,linux/arm64"
          fi
          # else: push -> multi-arch build-only CI on every commit (defaults above).
          {
            echo "version=$version"
            echo "ref=$ref"
            echo "push=$push"
            echo "platforms=$platforms"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::event=$EVENT version=${version:-<git>} push=$push platforms=$platforms"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.target.outputs.ref }}
          fetch-depth: 0 # full history so setuptools_scm can resolve a version

      - name: Resolve registries
        id: registries
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          images="ghcr.io/${REPO,,}"   # GHCR image names must be lowercase
          dockerhub=false
          # Require BOTH secrets before enabling Docker Hub. Gating on the
          # username alone would, in the half-configured case (username set but
          # token empty), still try the Docker Hub login -- which fails ("Password
          # required") and aborts the whole job, taking the otherwise-safe GHCR
          # push down with it. Demanding both degrades cleanly to GHCR-only.
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            images="${images}"$'\n'"docker.io/${DOCKERHUB_USERNAME}/yacron2"
            dockerhub=true
          fi
          {
            echo "dockerhub=$dockerhub"
            echo "images<<EOF"
            echo "$images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.registries.outputs.images }}
          tags: |
            type=raw,value=${{ steps.target.outputs.version }},enable=${{ steps.target.outputs.version != '' }}
            type=raw,value=latest,enable=${{ steps.target.outputs.push == 'true' }}
            type=raw,value=ci-build,enable=${{ steps.target.outputs.push == 'false' }}

      - name: Log in to GHCR
        if: steps.target.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: steps.target.outputs.push == 'true' && steps.registries.outputs.dockerhub == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ steps.target.outputs.platforms }}
          push: ${{ steps.target.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.target.outputs.version }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
