name: release

# Release pipeline (opt-in). It runs when:
#   - ANY commit included in a push to main has a [release] marker anywhere in
#     its message (not just the tip commit):
#         [release]          -> minor (default)
#         [release:major]    -> major
#         [release:minor]    -> minor
#         [release:patch]    -> patch
#     If several markers appear across the push, the most significant bump wins
#     (major > minor > patch). NOTE: the match is a substring, so a literal
#     "[release:patch]" written anywhere in a commit message WILL trigger a
#     release -- don't quote the marker verbatim in a commit message unless you
#     mean it. (Only commit messages are scanned, never file contents.)
#   - or it is started manually via workflow_dispatch (bump from the dropdown,
#     or an exact `tag` to release a specific X.Y.Z instead of the computed
#     next one -- the `tag` input wins over `bump` when set).
#
# On release it: gates on tox, computes the next version from the latest X.Y.Z
# tag (or uses the explicit `tag` input verbatim), builds at that version
# (SETUPTOOLS_SCM_PRETEND_VERSION) -- the wheel
# + sdist and self-contained PyInstaller binaries for Linux (amd64, arm64, i686,
# armv7, ppc64le, s390x and riscv64 in both glibc and musl/Alpine flavors, plus
# armv6 in musl only as Debian has no arm32v6), macOS (arm64 + amd64) and
# Windows (amd64 + arm64), each
# built on a matching runner (the non-native arches inside a container,
# armv7/armv6/ppc64le/s390x/riscv64 under QEMU) -- publishes the wheel + sdist to
# PyPI via
# Trusted Publishing (OIDC), then ONLY after a successful publish tags the
# commit and cuts a GitHub Release with the binaries attached. No file is
# committed back -> no loop; the binaries build BEFORE the publish (a broken
# build fails the run, never a half release) and a failed publish leaves no
# orphan tag, so a re-run cleanly retries.
#
# Example commit message:
#     Add retry backoff to the HTTP reporter
#
#     [release:minor]

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level (ignored when 'tag' is set)"
        type: choice
        options: [patch, minor, major]
        default: patch
      tag:
        description: "Exact version to release as X.Y.Z (overrides bump); leave blank to compute the next one"
        type: string
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

# Least-privilege default for all jobs; the `release` job opts up to the
# narrower set of write scopes it actually needs (see its own permissions:).
permissions:
  contents: read

# Network + interpreter hardening for the runner-native jobs that install with
# uv (gate/tox, native binaries, macOS, Windows, and the wheel+sdist build):
# UV_HTTP_TIMEOUT raises uv's per-request socket timeout (uv retries internally)
# and UV_PYTHON_DOWNLOADS=never keeps uv on the setup-python interpreter rather
# than fetching a managed one. The emulated foreign-arch binary jobs stay on pip
# inside their `docker run` containers -- uv's official image is amd64/arm64
# only and its musl ppc64le/s390x wheels don't exist -- mirroring build.yml.
env:
  UV_HTTP_TIMEOUT: "60"
  UV_PYTHON_DOWNLOADS: "never"

jobs:
  # Decide whether to release and at what level. Kept separate (and strict) so
  # the trigger logic lives in a real script, never a fuzzy `contains()` match.
  decide:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.d.outputs.release }}
      bump: ${{ steps.d.outputs.bump }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - id: d
        env:
          EVENT: ${{ github.event_name }}
          INPUT_BUMP: ${{ github.event.inputs.bump }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          release=false
          bump=minor
          if [ "$EVENT" = "workflow_dispatch" ]; then
            release=true
            bump="${INPUT_BUMP:-minor}"
          else
            # Trigger if ANY commit introduced by this push has a [release]
            # marker anywhere in its message -- not just the tip commit. The
            # range is the commits new in this push (BEFORE..AFTER); on a
            # brand-new branch BEFORE is all-zeros, so fall back to the tip.
            zero="0000000000000000000000000000000000000000"
            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$zero" ] \
                 || ! git rev-parse -q --verify "${BEFORE}^{commit}" >/dev/null; then
              msgs="$(git log -1 --pretty=%B "$AFTER")"
            else
              msgs="$(git log --pretty=%B "${BEFORE}..${AFTER}")"
            fi
            # Collect every marker token (substring match, anywhere in any
            # message), lowercased.
            markers="$(printf '%s\n' "$msgs" \
              | grep -oiE '\[release(:(major|minor|patch))?\]' \
              | tr '[:upper:]' '[:lower:]' || true)"
            if [ -n "$markers" ]; then
              release=true
              # If several markers appear, the most significant bump wins
              # (major > minor > patch); a bare [release] counts as minor.
              if printf '%s\n' "$markers" | grep -q '\[release:major\]'; then
                bump=major
              elif printf '%s\n' "$markers" | grep -qE '\[release(:minor)?\]'; then
                bump=minor
              else
                bump=patch
              fi
            fi
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "::notice::release=$release bump=$bump (event=$EVENT)"

  # Compute the next version once, here, so the binary builders and the
  # publish/release job all build at the same number. Refuses to proceed if the
  # computed tag already exists.
  version:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.ver.outputs.new }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history + tags so we can find the latest X.Y.Z
      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ needs.decide.outputs.bump }}
          OVERRIDE: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          if [ -n "${OVERRIDE:-}" ]; then
            # Explicit override from workflow_dispatch: release exactly this
            # version instead of the computed next one. Tags in this repo are
            # bare X.Y.Z and the rest of the pipeline (HISTORY.md lookup, asset
            # names, the PyPI/scm version) assumes that shape, so reject anything
            # else rather than silently building a malformed release.
            new="$OVERRIDE"
            if ! printf '%s' "$new" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid tag '$new'; expected X.Y.Z (digits only, no leading 'v')." >&2
              exit 1
            fi
            echo "::notice::Releasing $new (explicit tag override)"
          else
            latest=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
            latest=${latest:-0.0.0}
            IFS='.' read -r major minor patch <<<"$latest"
            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            new="${major}.${minor}.${patch}"
            echo "::notice::Releasing $new (previous $latest, bump=$BUMP)"
          fi

          # Applies to both paths: never clobber an existing tag (a failed
          # publish leaves no orphan tag, so a clean retry is still possible).
          if git rev-parse -q --verify "refs/tags/$new" >/dev/null; then
            echo "::error::Tag $new already exists; refusing to re-release." >&2
            exit 1
          fi

          echo "new=$new" >> "$GITHUB_OUTPUT"

  gate:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history + tags so setuptools_scm resolves a version
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14
      # tox-uv pulls in uv and makes tox provision envs + install deps with it.
      - run: pip install --upgrade pip tox tox-uv
      - run: tox  # runs py310, py311, py312, py313, py314, lint, mypy (see tox.ini)

  # Build the self-contained glibc PyInstaller binaries, one per architecture on
  # a native runner (no QEMU). Each is uploaded as an artifact for the release
  # job to attach. Built before the publish, so a broken binary fails the run
  # rather than producing a half-finished release; the per-arch `--version` smoke
  # test catches a bad bundle here. These target glibc (the Ubuntu runner's
  # libc) -- the `binaries-musl` job below covers Alpine/musl hosts.
  binaries:
    needs: [decide, version, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Build binary
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Runner-native, all-wheels arch: install into a throwaway uv venv and
          # freeze from it with `uv run` (uv discovers the setup-python 3.14).
          uv venv --python 3.14
          uv pip install pyinstaller==6.21.0  # pin matches pyinstaller/Dockerfile
          uv pip install .                     # bakes the pinned version into yacron2/version.py
          # Bundle uvloop (the `speedups` extra) so the binary runs the faster
          # event loop. Install a wheel where one exists, else build it from
          # sdist (ship uvloop as broadly as it compiles); a failed install
          # falls back to asyncio. verify_uvloop.py then proves the result
          # actually runs a loop (a source build can miscompile under emulation)
          # and uninstalls it if not, so a broken uvloop is never frozen in and
          # the binary cleanly uses asyncio.
          uv pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
          uv run python pyinstaller/verify_uvloop.py || uv pip uninstall uvloop || true
          # Bundle orjson (the `speedups` extra) to accelerate the durable-state
          # and cluster JSON paths; amd64/arm64 and macOS ship wheels (no Rust
          # needed). The shared script round-trip-verifies it and drops a broken
          # build, so the binary falls back to stdlib json (yacron2/_json).
          PIP="uv pip" PIPUNINST="uv pip uninstall" PY="uv run python" \
            sh pyinstaller/install_orjson.sh
          uv run pyinstaller pyinstaller/yacron2.spec
          dist/yacron2 --version            # smoke test: fails the job if the bundle is broken
          mv dist/yacron2 "dist/yacron2-linux-${{ matrix.arch }}"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: yacron2-linux-${{ matrix.arch }}
          path: dist/yacron2-linux-${{ matrix.arch }}
          if-no-files-found: error

  # Build the musl/Alpine self-contained binaries, one per architecture. GitHub
  # runners are glibc (Ubuntu), so the build runs *inside* an Alpine container
  # via `docker run` rather than a job-level `container:` -- that keeps checkout
  # and upload-artifact on the glibc host (Alpine lacks the glibc Node the runner
  # injects for JS actions) and confines musl to the build itself. amd64/arm64
  # build on native runners and i686 runs natively on the amd64 runner; armv7,
  # armv6, ppc64le, s390x and riscv64 run under QEMU. armv6 is musl-only -- the
  # Debian/glibc image has no arm32v6, so it has no binaries-glibc-extra
  # counterpart. Same pyinstaller pin and `--version` smoke test as the glibc job
  # above; the asset just carries a `-musl` suffix so it sits alongside the glibc
  # one on the release.
  binaries-musl:
    needs: [decide, version, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: i686
            runner: ubuntu-24.04
            platform: linux/386
          - arch: armv7
            runner: ubuntu-24.04
            platform: linux/arm/v7
            qemu: true            # no native 32-bit ARM on the runners -> emulate
          - arch: ppc64le
            runner: ubuntu-24.04
            platform: linux/ppc64le
            qemu: true            # no native ppc64le on the runners -> emulate
          - arch: s390x
            runner: ubuntu-24.04
            platform: linux/s390x
            qemu: true            # no native s390x on the runners -> emulate
          - arch: riscv64
            runner: ubuntu-24.04
            platform: linux/riscv64
            qemu: true            # no native riscv64 on the runners -> emulate
          # armv6 is musl-only: Debian/glibc ships no arm32v6 image (it ships
          # arm32v5), so there is no binaries-glibc-extra counterpart. Entire
          # C-ext stack + PyInstaller bootloader compile from sdist (no musllinux
          # armv6 wheels) -> slowest leg.
          - arch: armv6
            runner: ubuntu-24.04
            platform: linux/arm/v6
            qemu: true            # no native armv6 on the runners -> emulate
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      # Register binfmt/QEMU so `docker run --platform` can execute a foreign-arch
      # container (armv7, armv6, ppc64le, s390x, riscv64). amd64/arm64/i686 run
      # natively and skip this.
      - if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4.2.0
      - name: Build binary (Alpine/musl)
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          docker run --rm --platform ${{ matrix.platform }} \
            -e SETUPTOOLS_SCM_PRETEND_VERSION \
            -v "$PWD:/src" -w /src \
            python:3.14-alpine sh -euc '
              # build-base brings the C toolchain + strip (the spec sets
              # strip=True); libffi/zlib headers cover any dep that lacks a
              # musllinux wheel and falls back to compiling from sdist (notably
              # the i686 aiohttp stack, which ships no musllinux_i686 wheels).
              apk add --no-cache build-base libffi-dev zlib-dev
              pip install --upgrade pip
              pip install pyinstaller==6.21.0   # pin matches the glibc job (supports 3.14)
              pip install .                     # bakes the pinned version into yacron2/version.py
              # Bundle uvloop (the `speedups` extra): a musllinux wheel where one
              # exists (amd64/arm64), else a source build (ship it as broadly as
              # it compiles -- build-base above supplies the toolchain).
              # verify_uvloop.py proves the result runs a loop (a source build can
              # miscompile under QEMU) and uninstalls it otherwise, so a broken
              # uvloop is never frozen in; the binary then cleanly falls back to
              # asyncio.
              pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
              python pyinstaller/verify_uvloop.py || pip uninstall -y uvloop || true
              # Bundle orjson (the `speedups` extra): a musllinux wheel on amd64/
              # arm64, else a Rust source build. RUST_SETUP installs a CURRENT
              # Rust via rustup (distro rustc is older than the orjson MSRV) only
              # when the wheel is missing; the shared script round-trip-verifies
              # it and drops a broken QEMU build -> stdlib json fallback.
              RUST_SETUP="apk add --no-cache curl && curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | env CARGO_HOME=/opt/cargo RUSTUP_HOME=/opt/rustup sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path" sh pyinstaller/install_orjson.sh
              pyinstaller pyinstaller/yacron2.spec
              dist/yacron2 --version            # smoke test: a musl binary on a musl host
              mv dist/yacron2 dist/yacron2-linux-${{ matrix.arch }}-musl
            '
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: yacron2-linux-${{ matrix.arch }}-musl
          path: dist/yacron2-linux-${{ matrix.arch }}-musl
          if-no-files-found: error

  # Build the glibc self-contained binaries for the arches with no native GitHub
  # runner (i686, armv7, ppc64le, s390x, riscv64). The native `binaries` job
  # covers only amd64 and arm64 (the runners GitHub hosts) and PyInstaller is not
  # a cross-compiler, so -- like binaries-musl -- these build inside a container
  # via `docker run --platform`, here on python:3.14-slim (Debian glibc). i686
  # (linux/386) runs natively on the amd64 runner; armv7, ppc64le, s390x and
  # riscv64 run under QEMU. glibc wheel coverage varies: ppc64le/s390x have full
  # manylinux wheels, while the i686 aiohttp stack, propcache-on-armv7, and
  # multidict/frozenlist/ruamel.yaml.clib on riscv64 ship no wheel and compile
  # from sdist -- so build-essential is installed either way. Same pyinstaller
  # pin and `--version` smoke test as the other binary jobs; assets carry no
  # -musl suffix and sit beside the 64-bit glibc binaries on the release.
  binaries-glibc-extra:
    needs: [decide, version, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            runner: ubuntu-24.04
            platform: linux/386
          - arch: armv7
            runner: ubuntu-24.04
            platform: linux/arm/v7
            qemu: true
          - arch: ppc64le
            runner: ubuntu-24.04
            platform: linux/ppc64le
            qemu: true
          - arch: s390x
            runner: ubuntu-24.04
            platform: linux/s390x
            qemu: true
          - arch: riscv64
            runner: ubuntu-24.04
            platform: linux/riscv64
            qemu: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4.2.0
      - name: Build binary (Debian/glibc container)
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          docker run --rm --platform ${{ matrix.platform }} \
            -e SETUPTOOLS_SCM_PRETEND_VERSION \
            -v "$PWD:/src" -w /src \
            python:3.14-slim sh -euc '
              # build-essential brings gcc + strip (the spec sets strip=True);
              # libffi/zlib headers cover the C-extension deps that ship no glibc
              # wheel and compile from sdist (the i686 aiohttp stack; propcache on
              # armv7). ppc64le/s390x have full manylinux wheels, so the toolchain
              # goes unused there.
              apt-get update
              apt-get install -y --no-install-recommends build-essential libffi-dev zlib1g-dev
              pip install --upgrade pip
              pip install pyinstaller==6.21.0   # pin matches the other binary jobs
              pip install .                     # bakes the pinned version into yacron2/version.py
              # Bundle uvloop (the `speedups` extra): a manylinux wheel where one
              # exists (amd64/arm64), else a source build (ship it as broadly as
              # it compiles -- build-essential above supplies the toolchain).
              # verify_uvloop.py proves the result runs a loop (a source build can
              # miscompile under QEMU) and uninstalls it otherwise, so a broken
              # uvloop is never frozen in; the binary then cleanly falls back to
              # asyncio.
              pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
              python pyinstaller/verify_uvloop.py || pip uninstall -y uvloop || true
              # Bundle orjson (the `speedups` extra): a manylinux wheel on amd64/
              # arm64, else a Rust source build. RUST_SETUP installs a CURRENT
              # Rust via rustup (distro rustc is older than the orjson MSRV) only
              # when the wheel is missing; the shared script round-trip-verifies
              # it and drops a broken QEMU build -> stdlib json fallback.
              RUST_SETUP="apt-get -o Acquire::Retries=5 update && apt-get -o Acquire::Retries=5 install -y --no-install-recommends curl ca-certificates && curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | env CARGO_HOME=/opt/cargo RUSTUP_HOME=/opt/rustup sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path" sh pyinstaller/install_orjson.sh
              pyinstaller pyinstaller/yacron2.spec
              dist/yacron2 --version            # smoke test: native (i686) or emulated (armv7/ppc64le/s390x)
              mv dist/yacron2 dist/yacron2-linux-${{ matrix.arch }}
            '
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: yacron2-linux-${{ matrix.arch }}
          path: dist/yacron2-linux-${{ matrix.arch }}
          if-no-files-found: error

  # Build the self-contained macOS binaries, one per architecture on a native
  # runner. PyInstaller is not a cross-compiler, so each runner emits its own
  # arch: arm64 on Apple Silicon, amd64 on the Intel runner. Same pyinstaller
  # pin and `--version` smoke test as the Linux jobs; the assets carry a
  # `-macos-<arch>` suffix. The runner labels are pinned (like the Linux
  # `ubuntu-24.04*` jobs) so a release never silently jumps macOS versions --
  # bump them when GitHub retires this generation (note `macos-latest` is arm64
  # only; the Intel sibling is `macos-15-intel`).
  #
  # The binary is Developer ID signed (hardened runtime) and notarized when the
  # signing secrets are configured (see the "Sign and notarize" step). A bare
  # Mach-O cannot be stapled, so notarization publishes the ticket online and
  # Gatekeeper validates on first run -- no `xattr -d com.apple.quarantine`
  # needed by end users. If the secrets are absent the step is skipped with a
  # warning and the build ships unsigned (the old behavior), so a release is
  # never blocked on signing setup.
  binaries-macos:
    needs: [decide, version, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15          # Apple Silicon
          - arch: amd64
            runner: macos-15-intel    # Intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'  # set explicitly; don't rely on the runner's preinstalled patch level
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Build binary
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Runner-native, all-wheels arch: install into a throwaway uv venv and
          # freeze from it with `uv run` (uv discovers the setup-python 3.14).
          uv venv --python 3.14
          uv pip install pyinstaller==6.21.0  # pin matches the Linux jobs
          uv pip install .                     # bakes the pinned version into yacron2/version.py
          # Bundle uvloop (the `speedups` extra) for the faster event loop; macOS
          # ships wheels for both arches. verify_uvloop.py confirms it imports and
          # runs a loop, else uninstalls it so the binary falls back to asyncio
          # (yacron2/__main__._new_event_loop).
          uv pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
          uv run python pyinstaller/verify_uvloop.py || uv pip uninstall uvloop || true
          # Bundle orjson (the `speedups` extra) to accelerate the durable-state
          # and cluster JSON paths; amd64/arm64 and macOS ship wheels (no Rust
          # needed). The shared script round-trip-verifies it and drops a broken
          # build, so the binary falls back to stdlib json (yacron2/_json).
          PIP="uv pip" PIPUNINST="uv pip uninstall" PY="uv run python" \
            sh pyinstaller/install_orjson.sh
          uv run pyinstaller pyinstaller/yacron2.spec
          dist/yacron2 --version            # smoke test: fails the job if the bundle is broken
          # Assert the binary is the intended native arch: Rosetta would happily
          # run an x86_64 build on the arm64 runner and let the smoke test pass,
          # silently shipping a mislabelled asset. `file` reports x86_64/arm64.
          case "${{ matrix.arch }}" in
            amd64) want=x86_64 ;;
            arm64) want=arm64 ;;
          esac
          file dist/yacron2 | grep -q "$want"
      # Developer ID sign + notarize the binary in place. Guarded on the cert
      # secret: if the macOS signing secrets are not configured, the step warns
      # and exits 0, leaving the unsigned binary to ship as before. Renaming
      # after signing is safe -- the notarization ticket is keyed to the code
      # signature (cdhash), not the filename -- so this runs before the `mv`.
      - name: Sign and notarize
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ]; then
            echo "::warning::macOS signing secrets not set; shipping an unsigned, unnotarized binary."
            exit 0
          fi

          # Import the Developer ID cert into a throwaway, randomly-keyed
          # keychain scoped to this runner (never the login keychain).
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" \
            -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
          # Let codesign use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          # Sign with the hardened runtime + secure timestamp (both required for
          # notarization) and the PyInstaller entitlements, then verify.
          codesign --force --options runtime --timestamp \
            --entitlements pyinstaller/entitlements.plist \
            --keychain "$KEYCHAIN" \
            --sign "$MACOS_SIGN_IDENTITY" dist/yacron2
          codesign --verify --strict --verbose=2 dist/yacron2

          # Notarize: the zip is just the upload transport; the ticket binds to
          # the binary's signature, so we keep shipping the bare signed binary.
          echo "$MACOS_NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k dist/yacron2 "$RUNNER_TEMP/yacron2.zip"
          xcrun notarytool submit "$RUNNER_TEMP/yacron2.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait
      - name: Rename binary
        run: mv dist/yacron2 "dist/yacron2-macos-${{ matrix.arch }}"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: yacron2-macos-${{ matrix.arch }}
          path: dist/yacron2-macos-${{ matrix.arch }}
          if-no-files-found: error

  # Build the self-contained Windows binaries: amd64 on the hosted runner,
  # arm64 on the windows-11-arm runner. Same pyinstaller pin and `--version`
  # smoke test as the Linux/macOS jobs; the assets are yacron2-windows-<arch>.exe.
  # Any C-extension dep lacking a win_arm64 wheel (parts of the aiohttp stack and
  # ruamel.yaml.clib) compiles from sdist via the runner's Visual Studio ARM64
  # toolchain -- the same sdist fallback the QEMU Linux legs use for
  # riscv64/armv6. There is no Windows code-signing step (the binaries ship
  # unsigned, like the Linux binaries). A failing arch fails this job before the
  # publish, so the release simply doesn't happen (no tag is cut) rather than
  # half-completing. Steps use bash (git bash ships on the Windows runners) so
  # they read like the other jobs.
  binaries-windows:
    needs: [decide, version, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Build binary
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Runner-native (uv ships a win_arm64 build too); install into a
          # throwaway uv venv and freeze from it with `uv run`.
          uv venv --python 3.14
          uv pip install pyinstaller==6.21.0  # pin matches the Linux/macOS jobs
          uv pip install .                     # bakes the pinned version into yacron2/version.py
          # Bundle orjson (the `speedups` extra) for the durable-state / cluster
          # JSON paths; Windows amd64 ships a wheel (arm64 falls back if none).
          # The shared script round-trip-verifies it and drops a broken build,
          # so the binary falls back to stdlib json (yacron2/_json).
          PIP="uv pip" PIPUNINST="uv pip uninstall" PY="uv run python" \
            sh pyinstaller/install_orjson.sh
          uv run pyinstaller pyinstaller/yacron2.spec
          ./dist/yacron2.exe --version      # smoke test: fails the job if the bundle is broken
          mv dist/yacron2.exe "dist/yacron2-windows-${{ matrix.arch }}.exe"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: yacron2-windows-${{ matrix.arch }}
          path: dist/yacron2-windows-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    needs: [decide, version, gate, binaries, binaries-glibc-extra, binaries-musl, binaries-macos, binaries-windows]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the tag and create the GitHub Release
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"

      - name: Build distributions
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          uv build                                      # wheel + sdist into dist/
          uvx twine check dist/*.whl dist/*.tar.gz       # twine, run ephemerally

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@v1.14.0

      # Everything below runs only after PyPI has accepted the upload.
      - name: Tag the release
        env:
          NEW: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW" -m "Release $NEW"
          git push origin "refs/tags/$NEW"

      # Pull in every per-arch binary built by the binaries-* jobs (Linux glibc
      # + musl, macOS) and flatten them into ./binaries. The pattern must stay
      # broad enough to match all of them -- a too-narrow pattern (e.g.
      # `yacron2-linux-*`) does NOT error on the artifacts it misses, it just
      # silently drops them from the release.
      - name: Download release binaries
        uses: actions/download-artifact@v8.0.1
        with:
          path: binaries
          pattern: yacron2-*
          merge-multiple: true

      # Publish a SHA256SUMS manifest alongside the assets so downloads can be
      # verified (`sha256sum -c SHA256SUMS`) and the Homebrew formula can pin an
      # exact digest per binary. Hash with bare filenames (no path prefix) so it
      # verifies cleanly against assets downloaded into any directory.
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          cp dist/*.whl dist/*.tar.gz binaries/yacron2-* "$work"/
          ( cd "$work" && sha256sum -- * ) > SHA256SUMS
          cat SHA256SUMS

      - name: Build release notes from HISTORY.md
        env:
          NEW: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Pull this version's section out of HISTORY.md (everything between its
          # "## X.Y.Z (...)" header and the next "## " header), dropping leading
          # blank lines. Empty if there is no matching section.
          awk -v ver="$NEW" '
            index($0, "## " ver " ") == 1 { cap = 1; next }
            cap && /^## / { exit }
            cap { print }
          ' HISTORY.md | sed '/./,$!d' > release-notes.md
          if [ -s release-notes.md ]; then
            echo "::notice::Using HISTORY.md notes for $NEW."
          else
            echo "::warning::No HISTORY.md section for $NEW; release notes will be auto-generated only."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.version.outputs.new }}
          name: ${{ needs.version.outputs.new }}
          # The curated HISTORY.md section becomes the body; with
          # generate_release_notes it is prepended above GitHub's auto-generated
          # "What's Changed" / Full Changelog compare link.
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            SHA256SUMS
            dist/*.whl
            dist/*.tar.gz
            binaries/yacron2-linux-amd64
            binaries/yacron2-linux-arm64
            binaries/yacron2-linux-i686
            binaries/yacron2-linux-armv7
            binaries/yacron2-linux-ppc64le
            binaries/yacron2-linux-s390x
            binaries/yacron2-linux-riscv64
            binaries/yacron2-linux-amd64-musl
            binaries/yacron2-linux-arm64-musl
            binaries/yacron2-linux-i686-musl
            binaries/yacron2-linux-armv7-musl
            binaries/yacron2-linux-ppc64le-musl
            binaries/yacron2-linux-s390x-musl
            binaries/yacron2-linux-riscv64-musl
            binaries/yacron2-linux-armv6-musl
            binaries/yacron2-macos-amd64
            binaries/yacron2-macos-arm64
            binaries/yacron2-windows-amd64.exe
            binaries/yacron2-windows-arm64.exe

  # Build + push the multi-arch container image at the just-released version.
  # Invoked here (workflow_call) rather than via `on: release` because a Release
  # created by GITHUB_TOKEN does not emit a triggering `release: published`
  # event. Runs after `release` so the tag it checks out already exists; the
  # Dockerfile was already proven buildable by docker.yml's per-commit CI.
  docker:
    needs: [decide, version, release]
    if: needs.decide.outputs.release == 'true'
    permissions:
      contents: read
      packages: write   # push to GHCR
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ needs.version.outputs.new }}
    secrets: inherit

  # Push the just-released version to the Homebrew tap (ptweezy/homebrew-tap) so
  # `brew install ptweezy/tap/yacron2` and `brew upgrade` track releases with no
  # manual step. Re-renders Formula/yacron2.rb from the template in this repo,
  # pinning each binary's SHA256 from the SHA256SUMS the `release` job published.
  #
  # Cross-repo pushes need a token the default GITHUB_TOKEN can't provide: set a
  # repo secret HOMEBREW_TAP_TOKEN to a PAT (fine-grained, Contents: read/write
  # on ptweezy/homebrew-tap is enough). If it is unset the job warns and skips,
  # exactly like the macOS signing step, so a release is never blocked on it.
  homebrew:
    needs: [decide, version, release]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0    # for the formula template + render script

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping Homebrew formula update."
            exit 0
          fi

          # Fetch the checksums this release just published (retry: the asset can
          # lag the API by a few seconds after the release is created).
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 -o SHA256SUMS \
            "https://github.com/ptweezy/yacron2/releases/download/${VERSION}/SHA256SUMS"

          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/ptweezy/homebrew-tap.git" tap
          mkdir -p tap/Formula
          bash packaging/homebrew/render-formula.sh \
            "$VERSION" SHA256SUMS packaging/homebrew/yacron2.rb.tmpl > tap/Formula/yacron2.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/yacron2.rb; then
            echo "Formula already current for ${VERSION}."
            exit 0
          fi
          git add Formula/yacron2.rb
          git commit -m "yacron2 ${VERSION}"
          git push
