name: release

# Release pipeline (opt-in, strict). It runs ONLY when:
#   - a commit pushed to main has a line that is EXACTLY a release marker
#     (surrounding whitespace allowed) -- the marker must be on its OWN line,
#     so a mention of "[release]" inside prose never triggers anything:
#         [release]          -> minor (default)
#         [release:major]    -> major
#         [release:minor]    -> minor
#         [release:patch]    -> patch
#   - or it is started manually via workflow_dispatch (bump from the dropdown).
#
# On release it: gates on tox, computes the next version from the latest X.Y.Z
# tag, builds at that version (SETUPTOOLS_SCM_PRETEND_VERSION), publishes to
# PyPI via Trusted Publishing (OIDC), then ONLY after a successful publish tags
# the commit and cuts a GitHub Release. No file is committed back -> no loop;
# a failed publish leaves no orphan tag, so a re-run cleanly retries.
#
# Example commit message:
#     Add retry backoff to the HTTP reporter
#
#     [release:minor]

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        type: choice
        options: [minor, major, patch]
        default: minor

concurrency:
  group: release
  cancel-in-progress: false

# Least-privilege default for all jobs; the `release` job opts up to the
# narrower set of write scopes it actually needs (see its own permissions:).
permissions:
  contents: read

jobs:
  # Decide whether to release and at what level. Kept separate (and strict) so
  # the trigger logic lives in a real script, never a fuzzy `contains()` match.
  decide:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.d.outputs.release }}
      bump: ${{ steps.d.outputs.bump }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: d
        env:
          EVENT: ${{ github.event_name }}
          INPUT_BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail
          release=false
          bump=minor
          if [ "$EVENT" = "workflow_dispatch" ]; then
            release=true
            bump="${INPUT_BUMP:-minor}"
          else
            # Read the message via git (never interpolate it into the script)
            # and match a whole line that is only the marker.
            marker="$(git log -1 --pretty=%B \
              | grep -iE '^[[:space:]]*\[release(:(major|minor|patch))?\][[:space:]]*$' \
              | head -n1 | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]' || true)"
            case "$marker" in
              '[release]'|'[release:minor]') release=true; bump=minor ;;
              '[release:major]')             release=true; bump=major ;;
              '[release:patch]')             release=true; bump=patch ;;
            esac
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "::notice::release=$release bump=$bump (event=$EVENT)"

  gate:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history + tags so setuptools_scm resolves a version
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: |
            3.13
            3.14
      - run: pip install --upgrade pip tox
      - run: tox  # runs py313, py314, lint, mypy (see tox.ini)

  release:
    needs: [decide, gate]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the tag and create the GitHub Release
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ needs.decide.outputs.bump }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          latest=${latest:-0.0.0}
          IFS='.' read -r major minor patch <<<"$latest"
          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"

          if git rev-parse -q --verify "refs/tags/$new" >/dev/null; then
            echo "::error::Tag $new already exists; refusing to re-release." >&2
            exit 1
          fi

          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing $new (previous $latest, bump=$BUMP)"

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Build distributions
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.new }}
        run: |
          set -euo pipefail
          pip install --upgrade pip build twine
          python -m build
          twine check dist/*.whl dist/*.tar.gz

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      # Everything below runs only after PyPI has accepted the upload.
      - name: Tag the release
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.new }}" -m "Release ${{ steps.ver.outputs.new }}"
          git push origin "refs/tags/${{ steps.ver.outputs.new }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.new }}
          name: ${{ steps.ver.outputs.new }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
