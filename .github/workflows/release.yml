name: release

# Release pipeline (opt-in). It runs when:
#   - ANY commit included in a push to main has a [release] marker anywhere in
#     its message (not just the tip commit):
#         [release]          -> minor (default)
#         [release:major]    -> major
#         [release:minor]    -> minor
#         [release:patch]    -> patch
#     If several markers appear across the push, the most significant bump wins
#     (major > minor > patch). NOTE: the match is a substring, so a literal
#     "[release:patch]" written anywhere in a commit message WILL trigger a
#     release -- don't quote the marker verbatim in a commit message unless you
#     mean it. (Only commit messages are scanned, never file contents.)
#   - or it is started manually via workflow_dispatch (bump from the dropdown).
#
# On release it: gates on tox, computes the next version from the latest X.Y.Z
# tag, builds at that version (SETUPTOOLS_SCM_PRETEND_VERSION) -- both the wheel
# + sdist and self-contained PyInstaller binaries for linux/amd64 + linux/arm64
# in both glibc and musl/Alpine flavors (built natively on amd64 and arm64
# runners) -- publishes the wheel + sdist to
# PyPI via Trusted Publishing (OIDC), then ONLY after a successful publish tags
# the commit and cuts a GitHub Release with the binaries attached. No file is
# committed back -> no loop; the binaries build BEFORE the publish (a broken
# build fails the run, never a half release) and a failed publish leaves no
# orphan tag, so a re-run cleanly retries.
#
# Example commit message:
#     Add retry backoff to the HTTP reporter
#
#     [release:minor]

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        type: choice
        options: [minor, major, patch]
        default: minor

concurrency:
  group: release
  cancel-in-progress: false

# Least-privilege default for all jobs; the `release` job opts up to the
# narrower set of write scopes it actually needs (see its own permissions:).
permissions:
  contents: read

jobs:
  # Decide whether to release and at what level. Kept separate (and strict) so
  # the trigger logic lives in a real script, never a fuzzy `contains()` match.
  decide:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.d.outputs.release }}
      bump: ${{ steps.d.outputs.bump }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: d
        env:
          EVENT: ${{ github.event_name }}
          INPUT_BUMP: ${{ github.event.inputs.bump }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          release=false
          bump=minor
          if [ "$EVENT" = "workflow_dispatch" ]; then
            release=true
            bump="${INPUT_BUMP:-minor}"
          else
            # Trigger if ANY commit introduced by this push has a [release]
            # marker anywhere in its message -- not just the tip commit. The
            # range is the commits new in this push (BEFORE..AFTER); on a
            # brand-new branch BEFORE is all-zeros, so fall back to the tip.
            zero="0000000000000000000000000000000000000000"
            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$zero" ] \
                 || ! git rev-parse -q --verify "${BEFORE}^{commit}" >/dev/null; then
              msgs="$(git log -1 --pretty=%B "$AFTER")"
            else
              msgs="$(git log --pretty=%B "${BEFORE}..${AFTER}")"
            fi
            # Collect every marker token (substring match, anywhere in any
            # message), lowercased.
            markers="$(printf '%s\n' "$msgs" \
              | grep -oiE '\[release(:(major|minor|patch))?\]' \
              | tr '[:upper:]' '[:lower:]' || true)"
            if [ -n "$markers" ]; then
              release=true
              # If several markers appear, the most significant bump wins
              # (major > minor > patch); a bare [release] counts as minor.
              if printf '%s\n' "$markers" | grep -q '\[release:major\]'; then
                bump=major
              elif printf '%s\n' "$markers" | grep -qE '\[release(:minor)?\]'; then
                bump=minor
              else
                bump=patch
              fi
            fi
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "::notice::release=$release bump=$bump (event=$EVENT)"

  # Compute the next version once, here, so the binary builders and the
  # publish/release job all build at the same number. Refuses to proceed if the
  # computed tag already exists.
  version:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.ver.outputs.new }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history + tags so we can find the latest X.Y.Z
      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ needs.decide.outputs.bump }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          latest=${latest:-0.0.0}
          IFS='.' read -r major minor patch <<<"$latest"
          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"

          if git rev-parse -q --verify "refs/tags/$new" >/dev/null; then
            echo "::error::Tag $new already exists; refusing to re-release." >&2
            exit 1
          fi

          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing $new (previous $latest, bump=$BUMP)"

  gate:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history + tags so setuptools_scm resolves a version
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: |
            3.13
            3.14
      - run: pip install --upgrade pip tox
      - run: tox  # runs py313, py314, lint, mypy (see tox.ini)

  # Build the self-contained glibc PyInstaller binaries, one per architecture on
  # a native runner (no QEMU). Each is uploaded as an artifact for the release
  # job to attach. Built before the publish, so a broken binary fails the run
  # rather than producing a half-finished release; the per-arch `--version` smoke
  # test catches a bad bundle here. These target glibc (the Ubuntu runner's
  # libc) -- the `binaries-musl` job below covers Alpine/musl hosts.
  binaries:
    needs: [decide, version, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'
      - name: Build binary
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          pip install --upgrade pip
          pip install pyinstaller==6.21.0  # pin matches pyinstaller/Dockerfile
          pip install .                     # bakes the pinned version into yacron2/version.py
          pyinstaller pyinstaller/yacron2.spec
          dist/yacron2 --version            # smoke test: fails the job if the bundle is broken
          mv dist/yacron2 "dist/yacron2-linux-${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: yacron2-linux-${{ matrix.arch }}
          path: dist/yacron2-linux-${{ matrix.arch }}
          if-no-files-found: error

  # Build the musl/Alpine self-contained binaries, one per architecture. GitHub
  # runners are glibc (Ubuntu), so the build runs *inside* an Alpine container
  # via `docker run` rather than a job-level `container:` -- that keeps checkout
  # and upload-artifact on the glibc host (Alpine lacks the glibc Node the runner
  # injects for JS actions) and confines musl to the build itself. arm64 builds
  # on a native arm64 runner, so no QEMU is involved. Same pyinstaller pin and
  # `--version` smoke test as the glibc job above; the asset just carries a
  # `-musl` suffix so it sits alongside the glibc one on the release.
  binaries-musl:
    needs: [decide, version, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - name: Build binary (Alpine/musl)
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          docker run --rm --platform ${{ matrix.platform }} \
            -e SETUPTOOLS_SCM_PRETEND_VERSION \
            -v "$PWD:/src" -w /src \
            python:3.14-alpine sh -euc '
              # build-base brings the C toolchain + strip (the spec sets
              # strip=True); libffi/zlib headers cover any dep that lacks a
              # musllinux wheel and falls back to compiling from sdist.
              apk add --no-cache build-base libffi-dev zlib-dev
              pip install --upgrade pip
              pip install pyinstaller==6.21.0   # pin matches the glibc job (supports 3.14)
              pip install .                     # bakes the pinned version into yacron2/version.py
              pyinstaller pyinstaller/yacron2.spec
              dist/yacron2 --version            # smoke test: a musl binary on a musl host
              mv dist/yacron2 dist/yacron2-linux-${{ matrix.arch }}-musl
            '
      - uses: actions/upload-artifact@v4
        with:
          name: yacron2-linux-${{ matrix.arch }}-musl
          path: dist/yacron2-linux-${{ matrix.arch }}-musl
          if-no-files-found: error

  release:
    needs: [decide, version, gate, binaries, binaries-musl]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the tag and create the GitHub Release
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'

      - name: Build distributions
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          pip install --upgrade pip build twine
          python -m build
          twine check dist/*.whl dist/*.tar.gz

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      # Everything below runs only after PyPI has accepted the upload.
      - name: Tag the release
        env:
          NEW: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW" -m "Release $NEW"
          git push origin "refs/tags/$NEW"

      # Pull in the per-arch binaries built by the `binaries` job and flatten
      # them into ./binaries (yacron2-linux-amd64, yacron2-linux-arm64).
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: yacron2-linux-*
          merge-multiple: true

      - name: Build release notes from HISTORY.md
        env:
          NEW: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Pull this version's section out of HISTORY.md (everything between its
          # "## X.Y.Z (...)" header and the next "## " header), dropping leading
          # blank lines. Empty if there is no matching section.
          awk -v ver="$NEW" '
            index($0, "## " ver " ") == 1 { cap = 1; next }
            cap && /^## / { exit }
            cap { print }
          ' HISTORY.md | sed '/./,$!d' > release-notes.md
          if [ -s release-notes.md ]; then
            echo "::notice::Using HISTORY.md notes for $NEW."
          else
            echo "::warning::No HISTORY.md section for $NEW; release notes will be auto-generated only."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new }}
          name: ${{ needs.version.outputs.new }}
          # The curated HISTORY.md section becomes the body; with
          # generate_release_notes it is prepended above GitHub's auto-generated
          # "What's Changed" / Full Changelog compare link.
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            binaries/yacron2-linux-amd64
            binaries/yacron2-linux-arm64
            binaries/yacron2-linux-amd64-musl
            binaries/yacron2-linux-arm64-musl
