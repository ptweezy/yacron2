name: release

# Release pipeline (opt-in, strict). It runs ONLY when:
#   - a commit pushed to main has a line that is EXACTLY a release marker
#     (surrounding whitespace allowed) -- the marker must be on its OWN line,
#     so a mention of "[release]" inside prose never triggers anything:
#         [release]          -> minor (default)
#         [release:major]    -> major
#         [release:minor]    -> minor
#         [release:patch]    -> patch
#   - or it is started manually via workflow_dispatch (bump from the dropdown).
#
# On release it: gates on the Rust checks, computes the next version from the
# latest X.Y.Z tag, builds a binary for each target platform at that version
# (via the YACRON2_BUILD_VERSION env, so no file is committed back -> no loop),
# then ONLY after successful builds tags the commit and cuts a GitHub Release
# with the binaries attached. A failed build leaves no orphan tag.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        type: choice
        options: [minor, major, patch]
        default: minor

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.d.outputs.release }}
      bump: ${{ steps.d.outputs.bump }}
      version: ${{ steps.v.outputs.new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: d
        env:
          EVENT: ${{ github.event_name }}
          INPUT_BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail
          release=false
          bump=minor
          if [ "$EVENT" = "workflow_dispatch" ]; then
            release=true
            bump="${INPUT_BUMP:-minor}"
          else
            marker="$(git log -1 --pretty=%B \
              | grep -iE '^[[:space:]]*\[release(:(major|minor|patch))?\][[:space:]]*$' \
              | head -n1 | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]' || true)"
            case "$marker" in
              '[release]'|'[release:minor]') release=true; bump=minor ;;
              '[release:major]')             release=true; bump=major ;;
              '[release:patch]')             release=true; bump=patch ;;
            esac
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "::notice::release=$release bump=$bump (event=$EVENT)"
      - id: v
        if: steps.d.outputs.release == 'true'
        env:
          BUMP: ${{ steps.d.outputs.bump }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          latest=${latest:-0.0.0}
          IFS='.' read -r major minor patch <<<"$latest"
          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/$new" >/dev/null; then
            echo "::error::Tag $new already exists; refusing to re-release." >&2
            exit 1
          fi
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing $new (previous $latest, bump=$BUMP)"

  gate:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets

  build:
    needs: [decide, gate]
    if: needs.decide.outputs.release == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: yacron2-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: yacron2-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: yacron2-macos-arm64
    runs-on: ${{ matrix.os }}
    env:
      YACRON2_BUILD_VERSION: ${{ needs.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - run: cargo build --release
      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/yacron2.exe "dist/${{ matrix.artifact }}"
          else
            cp target/release/yacron2 "dist/${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [decide, build]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Tag the release
        env:
          NEW: ${{ needs.decide.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW" -m "Release $NEW"
          git push origin "refs/tags/$NEW"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.decide.outputs.version }}
          name: ${{ needs.decide.outputs.version }}
          generate_release_notes: true
          files: dist/*
