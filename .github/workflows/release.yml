name: CI

# ONE pipeline for everything. On EVERY push (any branch) and pull request it
# builds and tests the whole product in parallel -- the full tox matrix
# (lint/mypy/pytest), the wheel + sdist, the self-contained PyInstaller binaries
# for Linux (amd64, arm64, i686, armv7, ppc64le, s390x and riscv64 in both glibc
# and musl/Alpine flavors, plus armv6 in musl only), macOS (arm64 + amd64 on
# macOS 15, shipped; plus macOS 26/Tahoe as non-gating CI coverage) and Windows
# (amd64 + arm64), and every Docker image (8 distros, full arch set, build-only)
# -- and gates on ALL of it. Nothing is published on an ordinary commit.
#
# A release happens ONLY when either:
#   - a push to `main` carries a [release] marker in ANY of its commits:
#         [release]          -> minor (default)
#         [release:major]    -> major
#         [release:minor]    -> minor
#         [release:patch]    -> patch
#     (most significant marker across the push wins; substring match, so don't
#     quote the marker verbatim in a message unless you mean it), or
#   - it is started via workflow_dispatch (bump from the dropdown, or an exact
#     `tag` to release a specific X.Y.Z; the `tag` input wins over `bump`).
#
# On a release, once EVERY build + test job above has succeeded (the gate),
# and ONLY then, the pipeline publishes: the wheel + sdist to PyPI via Trusted
# Publishing (OIDC, skip-existing so a retry is a no-op), tags the commit
# (RELEASE_TOKEN so the tag can point at a commit that touches
# .github/workflows/), cuts a GitHub Release with ALL prebuilt binaries + a
# single SHA256SUMS, pushes every Docker image, and updates the Homebrew tap.
# Because the Release is gated on all binaries AND the Docker build, a broken or
# flaky arch (or Dockerfile) fails the run BEFORE anything is published -- never
# a half release. A failed publish leaves no orphan tag (tagged only after PyPI
# accepts), so a re-run cleanly retries.
#
# This file replaces the former build.yml + docker.yml + tox.yml + release.yml,
# whose binary/tox builds it deduplicates into one definition each.
#
# Example commit message:
#     Add retry backoff to the HTTP reporter
#
#     [release:minor]

on:
  push:
    branches: ["**"]  # build + test on every commit, on every branch
  pull_request:       # and on every PR (covers fork PRs, which don't push here)
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level (ignored when 'tag' is set)"
        type: choice
        options: [patch, minor, major]
        default: patch
      tag:
        description: "Exact version to release as X.Y.Z (overrides bump); leave blank to compute the next one"
        type: string
        default: ""

# One in-flight run per branch. A same-repo branch push and its PR share a group
# (github.ref_name == the PR's head ref), so the duplicate is cancelled rather
# than run twice. main is never cancelled (cancel-in-progress false there):
# consecutive main pushes QUEUE so releases serialize instead of racing, and a
# workflow_dispatch release is likewise protected from a later push cancelling it.
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.event_name != 'workflow_dispatch' }}

# Least-privilege default for all jobs; the publish jobs opt up to the narrower
# write scopes they actually need (see each one's own permissions:).
permissions:
  contents: read

# Network hardening for transient PyPI/network blips. Runner-native jobs install
# with uv (UV_HTTP_TIMEOUT raises its per-request socket timeout; uv retries
# internally) and UV_PYTHON_DOWNLOADS=never keeps uv on the setup-python
# interpreter rather than fetching a managed one. The emulated foreign-arch
# binary jobs stay on pip inside their `docker run` containers (uv's official
# image is amd64/arm64 only and lacks musl ppc64le/s390x wheels) and read
# PIP_RETRIES/PIP_TIMEOUT, forwarded into `docker run` with `-e`.
env:
  PIP_RETRIES: "5"
  PIP_TIMEOUT: "60"
  UV_HTTP_TIMEOUT: "60"
  UV_PYTHON_DOWNLOADS: "never"

jobs:
  # ---------------------------------------------------------------------------
  # Decide + version (run on every event; feed both the gate and the publish).
  # ---------------------------------------------------------------------------

  # Decide whether this run is a release and at what level. Kept separate (and
  # strict) so the trigger logic lives in a real script, never a fuzzy
  # `contains()` match. A release requires a workflow_dispatch OR a push to main
  # with a [release] marker -- a marker on any other branch, or a PR, never
  # releases (this file triggers on all branches + PRs, so `decide` itself must
  # enforce the main-only rule the old push:branches:[main] filter used to).
  decide:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.d.outputs.release }}
      bump: ${{ steps.d.outputs.bump }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - id: d
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          INPUT_BUMP: ${{ github.event.inputs.bump }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          release=false
          bump=minor
          if [ "$EVENT" = "workflow_dispatch" ]; then
            release=true
            bump="${INPUT_BUMP:-minor}"
          elif [ "$EVENT" = "push" ] && [ "$REF" = "refs/heads/main" ]; then
            # Trigger if ANY commit introduced by this push has a [release]
            # marker anywhere in its message -- not just the tip commit. The
            # range is the commits new in this push (BEFORE..AFTER); on a
            # brand-new branch BEFORE is all-zeros, so fall back to the tip.
            zero="0000000000000000000000000000000000000000"
            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$zero" ] \
                 || ! git rev-parse -q --verify "${BEFORE}^{commit}" >/dev/null; then
              msgs="$(git log -1 --pretty=%B "$AFTER")"
            else
              msgs="$(git log --pretty=%B "${BEFORE}..${AFTER}")"
            fi
            # Collect every marker token (substring match, anywhere in any
            # message), lowercased.
            markers="$(printf '%s\n' "$msgs" \
              | grep -oiE '\[release(:(major|minor|patch))?\]' \
              | tr '[:upper:]' '[:lower:]' || true)"
            if [ -n "$markers" ]; then
              release=true
              # If several markers appear, the most significant bump wins
              # (major > minor > patch); a bare [release] counts as minor.
              if printf '%s\n' "$markers" | grep -q '\[release:major\]'; then
                bump=major
              elif printf '%s\n' "$markers" | grep -qE '\[release(:minor)?\]'; then
                bump=minor
              else
                bump=patch
              fi
            fi
          fi
          # else: a PR or a non-main push -> build + test only, never release.
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "::notice::release=$release bump=$bump (event=$EVENT ref=$REF)"

  # Compute the version ONCE so every builder pins the same number via
  # SETUPTOOLS_SCM_PRETEND_VERSION. Runs unconditionally (the gate builds always
  # need a version): on a release it computes the next X.Y.Z (or the explicit
  # `tag` override) and refuses if that tag already exists; otherwise it emits
  # the natural setuptools_scm dev version (e.g. 1.2.9.devN+g<sha>), exactly as
  # the old build.yml did for its per-commit builds.
  version:
    needs: decide
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.ver.outputs.new }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history + tags so setuptools_scm / tag math resolve
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Compute version
        id: ver
        env:
          RELEASE: ${{ needs.decide.outputs.release }}
          BUMP: ${{ needs.decide.outputs.bump }}
          OVERRIDE: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$RELEASE" != "true" ]; then
            # Build-only run: resolve setuptools_scm's natural dev version off
            # git in a throwaway env (no venv/install left behind).
            new="$(uv run --no-project --with setuptools-scm python -m setuptools_scm)"
            echo "new=$new" >> "$GITHUB_OUTPUT"
            echo "::notice::Build-only at version $new (no release)."
            exit 0
          fi

          git fetch --tags --force
          if [ -n "${OVERRIDE:-}" ]; then
            # Explicit override from workflow_dispatch: release exactly this
            # version instead of the computed next one. Tags in this repo are
            # bare X.Y.Z and the rest of the pipeline (HISTORY.md lookup, asset
            # names, the PyPI/scm version) assumes that shape, so reject anything
            # else rather than silently building a malformed release.
            new="$OVERRIDE"
            if ! printf '%s' "$new" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid tag '$new'; expected X.Y.Z (digits only, no leading 'v')." >&2
              exit 1
            fi
            echo "::notice::Releasing $new (explicit tag override)"
          else
            latest=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
            latest=${latest:-0.0.0}
            IFS='.' read -r major minor patch <<<"$latest"
            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            new="${major}.${minor}.${patch}"
            echo "::notice::Releasing $new (previous $latest, bump=$BUMP)"
          fi

          # Never clobber an existing tag (a failed publish leaves no orphan tag,
          # so a clean retry is still possible).
          if git rev-parse -q --verify "refs/tags/$new" >/dev/null; then
            echo "::error::Tag $new already exists; refusing to re-release." >&2
            exit 1
          fi
          echo "new=$new" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Gate: tests + all binaries + all Docker images. Runs on EVERY event, in
  # parallel. The publish jobs below need every one of these to succeed.
  # ---------------------------------------------------------------------------

  tox-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
      # tox-uv pulls in uv and makes tox provision envs + install deps with it.
      - run: pip install --upgrade pip
      - run: pip install tox tox-uv
      - run: tox -e lint

  tox-mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
      - run: pip install --upgrade pip
      - run: pip install tox tox-uv
      - run: tox -e mypy

  tox:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]  # macOS is POSIX like Linux; add macos-latest to cover it too
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
        experimental: [false]
        include:
          # Windows on ARM64: a gating row on the latest stable Python so the
          # runtime is exercised on win-arm64 (the released .exe targets it too).
          - os: windows-11-arm
            python: '3.14'
            experimental: false
          # Python 3.15 is in beta. Run it for early signal, but never let it
          # gate CI -> continue-on-error. allow-prereleases lets setup-python
          # pick up the beta (a no-op for the stable rows).
          - os: ubuntu-latest
            python: '3.15'
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    # The suite runs in 1-3 min per cell; 20 bounds a hung asyncio test.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      - run: pip install --upgrade pip
      - run: pip install tox tox-uv
      - run: tox -e py
      # Every matrix cell uploads its own coverage.xml; Codecov merges them by
      # flag into one combined number. fail_ci_if_error stays false so a Codecov
      # outage never reds the build (and fork PRs with no token still pass).
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python }}
          fail_ci_if_error: false

  # Wheel + sdist, built and `twine check`ed exactly as it will be published to
  # PyPI. Uploaded as an artifact the `release` job publishes verbatim (so the
  # exact bytes that were checked here are what ship).
  dist:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Build distributions
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          uv build                                      # wheel + sdist into dist/
          uvx twine check dist/*.whl dist/*.tar.gz       # twine, run ephemerally
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  # Self-contained glibc PyInstaller binaries (amd64, arm64) on native runners
  # (no QEMU). The per-arch `--version` smoke test catches a bad bundle here.
  # These target glibc (the Ubuntu runner's libc); `binaries-musl` covers
  # Alpine/musl hosts.
  binaries:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Build binary
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Runner-native, all-wheels arch: install into a throwaway uv venv and
          # freeze from it with `uv run` (uv discovers the setup-python 3.14).
          uv venv --python 3.14
          uv pip install pyinstaller==6.21.0  # pin matches pyinstaller/Dockerfile
          uv pip install .                     # bakes the pinned version into cronstable/version.py
          # Bundle uvloop (the `speedups` extra) so the binary runs the faster
          # event loop. Install a wheel where one exists, else build it from
          # sdist (ship uvloop as broadly as it compiles); a failed install
          # falls back to asyncio. verify_uvloop.py then proves the result
          # actually runs a loop (a source build can miscompile under emulation)
          # and uninstalls it if not, so a broken uvloop is never frozen in and
          # the binary cleanly uses asyncio.
          uv pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
          uv run python pyinstaller/verify_uvloop.py || uv pip uninstall uvloop || true
          # Bundle orjson (the `speedups` extra) to accelerate the durable-state
          # and cluster JSON paths; amd64/arm64 and macOS ship wheels (no Rust
          # needed). The shared script round-trip-verifies it and drops a broken
          # build, so the binary falls back to stdlib json (cronstable/_json).
          PIP="uv pip" PIPUNINST="uv pip uninstall" PY="uv run python" \
            sh pyinstaller/install_orjson.sh
          uv run pyinstaller pyinstaller/cronstable.spec
          dist/cronstable --version            # smoke test: fails the job if the bundle is broken
          mv dist/cronstable "dist/cronstable-linux-${{ matrix.arch }}"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cronstable-linux-${{ matrix.arch }}
          path: dist/cronstable-linux-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7

  # Self-contained musl/Alpine binaries, one per arch. Runners are glibc, so the
  # build runs inside an Alpine container via `docker run` (checkout + upload
  # stay on the glibc host). amd64/arm64 build natively; i686 runs natively on
  # the amd64 runner; armv7, armv6, ppc64le, s390x and riscv64 run under QEMU.
  # armv6 is musl-only (Debian/glibc ships no arm32v6). Same pyinstaller pin and
  # `--version` smoke test as the glibc job; the asset carries a `-musl` suffix.
  binaries-musl:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: i686
            runner: ubuntu-24.04
            platform: linux/386
          - arch: armv7
            runner: ubuntu-24.04
            platform: linux/arm/v7
            qemu: true            # no native 32-bit ARM on the runners -> emulate
          - arch: ppc64le
            runner: ubuntu-24.04
            platform: linux/ppc64le
            qemu: true            # no native ppc64le on the runners -> emulate
          - arch: s390x
            runner: ubuntu-24.04
            platform: linux/s390x
            qemu: true            # no native s390x on the runners -> emulate
          - arch: riscv64
            runner: ubuntu-24.04
            platform: linux/riscv64
            qemu: true            # no native riscv64 on the runners -> emulate
          - arch: armv6
            runner: ubuntu-24.04
            platform: linux/arm/v6
            qemu: true            # no native armv6 on the runners -> emulate
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      # Register binfmt/QEMU so `docker run --platform` can execute a foreign-arch
      # container. amd64/arm64/i686 run natively and skip this.
      - if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4.2.0
      - name: Build binary (Alpine/musl)
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          docker run --rm --platform ${{ matrix.platform }} \
            -e SETUPTOOLS_SCM_PRETEND_VERSION \
            -e PIP_RETRIES -e PIP_TIMEOUT \
            -v "$PWD:/src" -w /src \
            python:3.14-alpine sh -euc '
              # build-base brings the C toolchain + strip (the spec sets
              # strip=True); libffi/zlib headers cover any dep that lacks a
              # musllinux wheel and falls back to compiling from sdist (notably
              # the i686 aiohttp stack, which ships no musllinux_i686 wheels).
              apk add --no-cache build-base libffi-dev zlib-dev
              pip install --upgrade pip
              pip install pyinstaller==6.21.0   # pin matches the glibc job (supports 3.14)
              pip install .                     # bakes the pinned version into cronstable/version.py
              # Bundle uvloop (the `speedups` extra): a musllinux wheel where one
              # exists (amd64/arm64), else a source build. verify_uvloop.py proves
              # the result runs a loop (a source build can miscompile under QEMU)
              # and uninstalls it otherwise, so a broken uvloop is never frozen
              # in; the binary then cleanly falls back to asyncio.
              pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
              python pyinstaller/verify_uvloop.py || pip uninstall -y uvloop || true
              # Bundle orjson (the `speedups` extra): a musllinux wheel on amd64/
              # arm64, else a Rust source build. RUST_SETUP installs a CURRENT
              # Rust via rustup (distro rustc is older than the orjson MSRV) only
              # when the wheel is missing; the shared script round-trip-verifies
              # it and drops a broken QEMU build -> stdlib json fallback.
              RUST_SETUP="apk add --no-cache curl && curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | env CARGO_HOME=/opt/cargo RUSTUP_HOME=/opt/rustup sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path" sh pyinstaller/install_orjson.sh
              pyinstaller pyinstaller/cronstable.spec
              dist/cronstable --version            # smoke test: a musl binary on a musl host
              mv dist/cronstable dist/cronstable-linux-${{ matrix.arch }}-musl
            '
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cronstable-linux-${{ matrix.arch }}-musl
          path: dist/cronstable-linux-${{ matrix.arch }}-musl
          if-no-files-found: error
          retention-days: 7

  # Self-contained glibc binaries for the arches with no native GitHub runner
  # (i686, armv7, ppc64le, s390x, riscv64). PyInstaller is not a cross-compiler,
  # so -- like binaries-musl -- these build inside a container via
  # `docker run --platform`, here on python:3.14-slim (Debian glibc). i686 runs
  # natively on the amd64 runner; armv7, ppc64le, s390x and riscv64 under QEMU.
  binaries-glibc-extra:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            runner: ubuntu-24.04
            platform: linux/386
          - arch: armv7
            runner: ubuntu-24.04
            platform: linux/arm/v7
            qemu: true
          - arch: ppc64le
            runner: ubuntu-24.04
            platform: linux/ppc64le
            qemu: true
          - arch: s390x
            runner: ubuntu-24.04
            platform: linux/s390x
            qemu: true
          - arch: riscv64
            runner: ubuntu-24.04
            platform: linux/riscv64
            qemu: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4.2.0
      - name: Build binary (Debian/glibc container)
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          docker run --rm --platform ${{ matrix.platform }} \
            -e SETUPTOOLS_SCM_PRETEND_VERSION \
            -e PIP_RETRIES -e PIP_TIMEOUT \
            -v "$PWD:/src" -w /src \
            python:3.14-slim sh -euc '
              # build-essential brings gcc + strip (the spec sets strip=True);
              # libffi/zlib headers cover the C-extension deps that ship no glibc
              # wheel and compile from sdist (the i686 aiohttp stack; propcache on
              # armv7). ppc64le/s390x have full manylinux wheels, so the toolchain
              # goes unused there.
              apt-get update
              apt-get install -y --no-install-recommends build-essential libffi-dev zlib1g-dev
              pip install --upgrade pip
              pip install pyinstaller==6.21.0   # pin matches the other binary jobs
              pip install .                     # bakes the pinned version into cronstable/version.py
              # Bundle uvloop (the `speedups` extra): a manylinux wheel where one
              # exists (amd64/arm64), else a source build. verify_uvloop.py proves
              # the result runs a loop (a source build can miscompile under QEMU)
              # and uninstalls it otherwise, so a broken uvloop is never frozen
              # in; the binary then cleanly falls back to asyncio.
              pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
              python pyinstaller/verify_uvloop.py || pip uninstall -y uvloop || true
              # Bundle orjson (the `speedups` extra): a manylinux wheel on amd64/
              # arm64, else a Rust source build. RUST_SETUP installs a CURRENT
              # Rust via rustup (distro rustc is older than the orjson MSRV) only
              # when the wheel is missing; the shared script round-trip-verifies
              # it and drops a broken QEMU build -> stdlib json fallback.
              RUST_SETUP="apt-get -o Acquire::Retries=5 update && apt-get -o Acquire::Retries=5 install -y --no-install-recommends curl ca-certificates && curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | env CARGO_HOME=/opt/cargo RUSTUP_HOME=/opt/rustup sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path" sh pyinstaller/install_orjson.sh
              pyinstaller pyinstaller/cronstable.spec
              dist/cronstable --version            # smoke test: native (i686) or emulated (armv7/ppc64le/s390x)
              mv dist/cronstable dist/cronstable-linux-${{ matrix.arch }}
            '
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cronstable-linux-${{ matrix.arch }}
          path: dist/cronstable-linux-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7

  # Self-contained macOS binaries. The shipped pair is macOS 15 (arm64 + amd64),
  # signed + notarized on a release. macOS 26 (Tahoe) is built too for early
  # OS-version breakage signal, but it is CI-ONLY: continue-on-error so a flaky
  # Tahoe build never blocks a release, and it is neither signed nor attached.
  # `ship` picks the shipped rows; `asset` names the artifact (the shipped ones
  # keep the bare `macos-<arch>` names the Release + Homebrew formula expect).
  binaries-macos:
    needs: [decide, version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15          # macOS 15, Apple Silicon -- shipped
            ship: true
            asset: macos-arm64
          - arch: amd64
            runner: macos-15-intel    # macOS 15, Intel -- shipped
            ship: true
            asset: macos-amd64
          - arch: arm64
            runner: macos-26          # macOS 26 (Tahoe), Apple Silicon -- CI only
            ship: false
            asset: macos26-arm64
          - arch: amd64
            runner: macos-26-intel    # macOS 26 (Tahoe), Intel -- CI only
            ship: false
            asset: macos26-amd64
    runs-on: ${{ matrix.runner }}
    # The macOS 26 rows are coverage-only: never let them gate a release.
    continue-on-error: ${{ !matrix.ship }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'  # set explicitly; don't rely on the runner's preinstalled patch level
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Build binary
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Runner-native, all-wheels arch: install into a throwaway uv venv and
          # freeze from it with `uv run` (uv discovers the setup-python 3.14).
          uv venv --python 3.14
          uv pip install pyinstaller==6.21.0  # pin matches the Linux jobs
          uv pip install .                     # bakes the pinned version into cronstable/version.py
          # Bundle uvloop (the `speedups` extra) for the faster event loop; macOS
          # ships wheels for both arches. verify_uvloop.py confirms it imports and
          # runs a loop, else uninstalls it so the binary falls back to asyncio.
          uv pip install "uvloop>=0.19" || echo "uvloop unavailable; using asyncio"
          uv run python pyinstaller/verify_uvloop.py || uv pip uninstall uvloop || true
          # Bundle orjson (the `speedups` extra); macOS ships wheels (no Rust).
          # The shared script round-trip-verifies it and drops a broken build, so
          # the binary falls back to stdlib json (cronstable/_json).
          PIP="uv pip" PIPUNINST="uv pip uninstall" PY="uv run python" \
            sh pyinstaller/install_orjson.sh
          uv run pyinstaller pyinstaller/cronstable.spec
          dist/cronstable --version            # smoke test: fails the job if the bundle is broken
          # Assert the binary is the intended native arch: Rosetta would happily
          # run an x86_64 build on the arm64 runner and let the smoke test pass,
          # silently producing a mislabelled asset. `file` reports x86_64/arm64.
          case "${{ matrix.arch }}" in
            amd64) want=x86_64 ;;
            arm64) want=arm64 ;;
          esac
          file dist/cronstable | grep -q "$want"
      # Developer ID sign + notarize the SHIPPED binary in place, on a release
      # only. Guarded on the cert secret too: if the signing secrets are not
      # configured, the step warns and exits 0, shipping an unsigned binary.
      # Renaming after signing is safe -- the notarization ticket is keyed to the
      # code signature (cdhash), not the filename -- so this runs before the `mv`.
      - name: Sign and notarize
        if: ${{ needs.decide.outputs.release == 'true' && matrix.ship }}
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ]; then
            echo "::warning::macOS signing secrets not set; shipping an unsigned, unnotarized binary."
            exit 0
          fi

          # Import the Developer ID cert into a throwaway, randomly-keyed
          # keychain scoped to this runner (never the login keychain).
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" \
            -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
          # Let codesign use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          # Sign with the hardened runtime + secure timestamp (both required for
          # notarization) and the PyInstaller entitlements, then verify.
          codesign --force --options runtime --timestamp \
            --entitlements pyinstaller/entitlements.plist \
            --keychain "$KEYCHAIN" \
            --sign "$MACOS_SIGN_IDENTITY" dist/cronstable
          codesign --verify --strict --verbose=2 dist/cronstable

          # Notarize: the zip is just the upload transport; the ticket binds to
          # the binary's signature, so we keep shipping the bare signed binary.
          echo "$MACOS_NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k dist/cronstable "$RUNNER_TEMP/cronstable.zip"
          xcrun notarytool submit "$RUNNER_TEMP/cronstable.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait
      - name: Rename binary
        run: mv dist/cronstable "dist/cronstable-${{ matrix.asset }}"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cronstable-${{ matrix.asset }}
          path: dist/cronstable-${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  # Self-contained Windows binaries: amd64 on the hosted runner, arm64 on the
  # windows-11-arm runner. Any C-extension dep lacking a win_arm64 wheel (parts
  # of the aiohttp stack, ruamel.yaml.clib) compiles from sdist via the runner's
  # Visual Studio ARM64 toolchain. Same pyinstaller pin + `--version` smoke test;
  # the assets are cronstable-windows-<arch>.exe. Steps use bash (git bash ships
  # on the Windows runners).
  binaries-windows:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm has a base (version is pinned below)
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.11.26"
      - name: Build binary
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Runner-native (uv ships a win_arm64 build too); install into a
          # throwaway uv venv and freeze from it with `uv run`.
          uv venv --python 3.14
          uv pip install pyinstaller==6.21.0  # pin matches the Linux/macOS jobs
          uv pip install .                     # bakes the pinned version into cronstable/version.py
          # Bundle orjson (the `speedups` extra) for the durable-state / cluster
          # JSON paths; Windows amd64 ships a wheel (arm64 falls back if none).
          # The shared script round-trip-verifies it and drops a broken build,
          # so the binary falls back to stdlib json (cronstable/_json).
          PIP="uv pip" PIPUNINST="uv pip uninstall" PY="uv run python" \
            sh pyinstaller/install_orjson.sh
          uv run pyinstaller pyinstaller/cronstable.spec
          ./dist/cronstable.exe --version      # smoke test: fails the job if the bundle is broken
          mv dist/cronstable.exe "dist/cronstable-windows-${{ matrix.arch }}.exe"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cronstable-windows-${{ matrix.arch }}
          path: dist/cronstable-windows-${{ matrix.arch }}.exe
          if-no-files-found: error
          retention-days: 7

  # Build EVERY container image (8 distros, full published arch set) build-only,
  # no push -- the Docker half of the gate. Proves every Dockerfile still builds
  # for every arch on every commit; `docker-push` re-runs these with a push once
  # the whole gate passes. Uniform across PRs and releases (no secrets, no
  # login), so a fork PR exercises it too.
  docker:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # one distro failing must not cancel the others
      matrix:
        include:
          - distro: debian
            dockerfile: Dockerfile
            platforms: "linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64"
          - distro: alpine
            dockerfile: docker/Dockerfile.alpine
            platforms: "linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64"
          - distro: ubuntu
            dockerfile: docker/Dockerfile.ubuntu
            platforms: "linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64"
          - distro: rhel
            dockerfile: docker/Dockerfile.rhel
            platforms: "linux/amd64,linux/arm64,linux/ppc64le,linux/s390x"
          - distro: fedora
            dockerfile: docker/Dockerfile.fedora
            platforms: "linux/amd64,linux/arm64,linux/ppc64le,linux/s390x"
          - distro: opensuse
            dockerfile: docker/Dockerfile.opensuse
            platforms: "linux/amd64,linux/arm64,linux/ppc64le,linux/s390x"
          - distro: amazonlinux
            dockerfile: docker/Dockerfile.amazonlinux
            platforms: "linux/amd64,linux/arm64"
          # distroless is amd64/arm64 only: gcr.io/distroless/python3-debian12
          # publishes no ppc64le/s390x manifest, so requesting them aborts.
          - distro: distroless
            dockerfile: docker/Dockerfile.distroless
            platforms: "linux/amd64,linux/arm64"
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # full history so setuptools_scm can resolve a version
      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Build image (build-only gate)
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: false
          tags: cronstable:ci-${{ matrix.distro }}
          build-args: |
            VERSION=${{ needs.version.outputs.new }}
          provenance: false
          # Scope the GHA cache per distro so the builds don't clobber each
          # other's layers (and warm the cache for the release `docker-push`).
          cache-from: type=gha,scope=${{ matrix.distro }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}

  # ---------------------------------------------------------------------------
  # Publish. Runs ONLY on a release, and ONLY after every gate job above has
  # succeeded. Skip-propagation makes docker-push/homebrew skip automatically
  # when `release` is skipped on an ordinary commit (do NOT add always()).
  # ---------------------------------------------------------------------------

  release:
    needs:
      - decide
      - version
      - tox
      - tox-lint
      - tox-mypy
      - dist
      - binaries
      - binaries-musl
      - binaries-glibc-extra
      - binaries-macos
      - binaries-windows
      - docker
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the tag and create the GitHub Release
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      # The wheel + sdist built (and twine-checked) by `dist`: publish these
      # exact bytes rather than rebuilding.
      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          # Idempotent re-runs: the publish precedes the tag/Release below, so if
          # a later step fails (e.g. the tag push) the version is already on PyPI.
          # skip-existing makes re-running the workflow a no-op on the upload
          # instead of a hard "file already exists" failure, so the tag + Release
          # can be completed on a retry without burning the version.
          skip-existing: true

      # Everything below runs only after PyPI has accepted the upload.
      - name: Tag the release
        env:
          NEW: ${{ needs.version.outputs.new }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW" -m "Release $NEW"
          # The default GITHUB_TOKEN is the GitHub Actions *App*, and GitHub
          # forbids an App from pushing a ref that creates/updates any file under
          # .github/workflows/ unless the token carries the `workflows` scope --
          # which is NOT grantable to GITHUB_TOKEN. This release tag points at a
          # commit that may itself modify this workflow, so pushing it with
          # GITHUB_TOKEN is rejected. Push instead with RELEASE_TOKEN -- a PAT or
          # GitHub App token with `workflow` scope (fine-grained: Contents +
          # Workflows: write) -- exactly like the cross-repo Homebrew push uses
          # HOMEBREW_TAP_TOKEN. If it is unset we fall back to GITHUB_TOKEN with a
          # warning (works only when the tagged commit doesn't touch
          # .github/workflows/).
          if [ -n "${RELEASE_TOKEN:-}" ]; then
            git push "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/$NEW"
          else
            echo "::warning::RELEASE_TOKEN not set; pushing the tag with the default GITHUB_TOKEN. This FAILS if the tagged commit modifies .github/workflows/ -- set RELEASE_TOKEN (Contents + Workflows: write) to fix."
            git push origin "refs/tags/$NEW"
          fi

      # Pull in every per-arch binary the gate built (fast + slow). The pattern
      # is broad and flattens them into ./binaries; the CI-only macOS 26 assets
      # (cronstable-macos26-*) land here too but are neither hashed nor attached
      # below (the lists are explicit).
      - name: Download release binaries
        uses: actions/download-artifact@v8.0.1
        with:
          path: binaries
          pattern: cronstable-*
          merge-multiple: true

      # One SHA256SUMS over the dist + every SHIPPED binary (bare filenames, so
      # `sha256sum -c` works from any directory). Enumerated explicitly -- a
      # `cronstable-*` glob would fold the CI-only macOS 26 binaries into the
      # shipped manifest.
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          cp dist/*.whl dist/*.tar.gz \
             binaries/cronstable-linux-amd64 binaries/cronstable-linux-arm64 \
             binaries/cronstable-linux-i686 binaries/cronstable-linux-armv7 \
             binaries/cronstable-linux-ppc64le binaries/cronstable-linux-s390x \
             binaries/cronstable-linux-riscv64 \
             binaries/cronstable-linux-amd64-musl binaries/cronstable-linux-arm64-musl \
             binaries/cronstable-linux-i686-musl binaries/cronstable-linux-armv7-musl \
             binaries/cronstable-linux-ppc64le-musl binaries/cronstable-linux-s390x-musl \
             binaries/cronstable-linux-riscv64-musl binaries/cronstable-linux-armv6-musl \
             binaries/cronstable-macos-amd64 binaries/cronstable-macos-arm64 \
             binaries/cronstable-windows-amd64.exe binaries/cronstable-windows-arm64.exe \
             "$work"/
          ( cd "$work" && sha256sum -- * ) > SHA256SUMS
          cat SHA256SUMS

      - name: Build release notes from HISTORY.md
        env:
          NEW: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          # Pull this version's section out of HISTORY.md (everything between its
          # own "## X.Y.Z" header and the next "## " header), dropping leading
          # blank lines. The header is matched on whitespace-split fields
          # ($1 == "##", $2 == the exact version) so it hits whether the heading
          # is still bare ("## 1.2.9") or already dated ("## 1.2.9 (2026-07-07)").
          # The exact $2 match also keeps 1.2.1 from swallowing 1.2.10's section.
          awk -v ver="$NEW" '
            $1 == "##" && $2 == ver { cap = 1; next }
            cap && /^## / { exit }
            cap { print }
          ' HISTORY.md | sed '/./,$!d' > release-notes.md
          if [ -s release-notes.md ]; then
            echo "::notice::Using HISTORY.md notes for $NEW."
          else
            echo "::warning::No HISTORY.md section for $NEW; release notes will be auto-generated only."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.version.outputs.new }}
          name: ${{ needs.version.outputs.new }}
          # The curated HISTORY.md section becomes the body; with
          # generate_release_notes it is prepended above GitHub's auto-generated
          # "What's Changed" / Full Changelog compare link.
          body_path: release-notes.md
          generate_release_notes: true
          # Every shipped binary + the single SHA256SUMS, attached in one shot
          # (no later attach step, so nothing ever fights immutable-release
          # protection).
          files: |
            SHA256SUMS
            dist/*.whl
            dist/*.tar.gz
            binaries/cronstable-linux-amd64
            binaries/cronstable-linux-arm64
            binaries/cronstable-linux-i686
            binaries/cronstable-linux-armv7
            binaries/cronstable-linux-ppc64le
            binaries/cronstable-linux-s390x
            binaries/cronstable-linux-riscv64
            binaries/cronstable-linux-amd64-musl
            binaries/cronstable-linux-arm64-musl
            binaries/cronstable-linux-i686-musl
            binaries/cronstable-linux-armv7-musl
            binaries/cronstable-linux-ppc64le-musl
            binaries/cronstable-linux-s390x-musl
            binaries/cronstable-linux-riscv64-musl
            binaries/cronstable-linux-armv6-musl
            binaries/cronstable-macos-amd64
            binaries/cronstable-macos-arm64
            binaries/cronstable-windows-amd64.exe
            binaries/cronstable-windows-arm64.exe

  # Build + push the multi-arch container images at the just-released version.
  # Runs after `release` (so the tag it checks out exists) and is thus gated on
  # the whole build+test gate, including the `docker` build-only job, via
  # `needs: release`. Pushes one image per distro to GHCR (and Docker Hub when
  # the DOCKERHUB_* secrets are set); the Debian image owns the bare
  # `latest`/`<version>` tags, the variants get `-<distro>` suffixes.
  docker-push:
    needs: [decide, version, release]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            dockerfile: Dockerfile
            suffix: ""
            platforms: "linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64"
          - distro: alpine
            dockerfile: docker/Dockerfile.alpine
            suffix: "-alpine"
            platforms: "linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64"
          - distro: ubuntu
            dockerfile: docker/Dockerfile.ubuntu
            suffix: "-ubuntu"
            platforms: "linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64"
          - distro: rhel
            dockerfile: docker/Dockerfile.rhel
            suffix: "-rhel"
            platforms: "linux/amd64,linux/arm64,linux/ppc64le,linux/s390x"
          - distro: fedora
            dockerfile: docker/Dockerfile.fedora
            suffix: "-fedora"
            platforms: "linux/amd64,linux/arm64,linux/ppc64le,linux/s390x"
          - distro: opensuse
            dockerfile: docker/Dockerfile.opensuse
            suffix: "-opensuse"
            platforms: "linux/amd64,linux/arm64,linux/ppc64le,linux/s390x"
          - distro: amazonlinux
            dockerfile: docker/Dockerfile.amazonlinux
            suffix: "-amazonlinux"
            platforms: "linux/amd64,linux/arm64"
          - distro: distroless
            dockerfile: docker/Dockerfile.distroless
            suffix: "-distroless"
            platforms: "linux/amd64,linux/arm64"
    steps:
      - name: Resolve registries
        id: registries
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          images="ghcr.io/${REPO,,}"   # GHCR image names must be lowercase
          dockerhub=false
          # Require BOTH secrets before enabling Docker Hub. Gating on the
          # username alone would, in the half-configured case, still try the
          # Docker Hub login -- which fails and aborts the whole job, taking the
          # otherwise-safe GHCR push down with it. Demanding both degrades
          # cleanly to GHCR-only.
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            images="${images}"$'\n'"docker.io/${DOCKERHUB_USERNAME}/cronstable"
            dockerhub=true
          fi
          {
            echo "dockerhub=$dockerhub"
            echo "images<<EOF"
            echo "$images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.version.outputs.new }}  # the tag `release` just pushed
          fetch-depth: 0 # full history so setuptools_scm can resolve a version

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ steps.registries.outputs.images }}
          # The distro suffix (e.g. `-alpine`) is appended to every tag; it is
          # empty for Debian, which therefore owns the bare `latest`/`<version>`.
          flavor: |
            latest=false
            suffix=${{ matrix.suffix }}
          tags: |
            type=raw,value=${{ needs.version.outputs.new }}
            type=raw,value=latest
            # Explicit -debian alias so the default base is pinnable by name too
            # (latest-debian / <version>-debian), mirroring the other variants.
            type=raw,value=${{ needs.version.outputs.new }}-debian,enable=${{ matrix.distro == 'debian' }}
            type=raw,value=latest-debian,enable=${{ matrix.distro == 'debian' }}

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: steps.registries.outputs.dockerhub == 'true'
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.version.outputs.new }}
          provenance: false
          # Reuse the layers the gate `docker` job just cached (same per-distro
          # scope), so this is mostly manifest assembly + push.
          cache-from: type=gha,scope=${{ matrix.distro }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}

  # Push the just-released version to the Homebrew tap (ptweezy/homebrew-tap) so
  # `brew install ptweezy/tap/cronstable` and `brew upgrade` track releases with
  # no manual step. Re-renders Formula/cronstable.rb from the template in this
  # repo, pinning each binary's SHA256 from the SHA256SUMS the `release` job
  # published (it covers the macOS + linux glibc amd64/arm64 sums this formula
  # needs).
  #
  # Cross-repo pushes need a token the default GITHUB_TOKEN can't provide: set a
  # repo secret HOMEBREW_TAP_TOKEN to a PAT (fine-grained, Contents: read/write
  # on ptweezy/homebrew-tap is enough). If it is unset the job warns and skips.
  homebrew:
    needs: [decide, version, release]
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0    # for the formula template + render script

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.version.outputs.new }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping Homebrew formula update."
            exit 0
          fi

          # Fetch the checksums this release just published (retry: the asset can
          # lag the API by a few seconds after the release is created).
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 -o SHA256SUMS \
            "https://github.com/ptweezy/cronstable/releases/download/${VERSION}/SHA256SUMS"

          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/ptweezy/homebrew-tap.git" tap
          mkdir -p tap/Formula
          bash packaging/homebrew/render-formula.sh \
            "$VERSION" SHA256SUMS packaging/homebrew/cronstable.rb.tmpl > tap/Formula/cronstable.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/cronstable.rb; then
            echo "Formula already current for ${VERSION}."
            exit 0
          fi
          git add Formula/cronstable.rb
          git commit -m "cronstable ${VERSION}"
          git push
