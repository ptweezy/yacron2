name: tox
on: [push, pull_request]

# Least-privilege default: every job here only reads the repo.
permissions:
  contents: read

# Make every package install resilient to transient PyPI/network blips.
# PIP_RETRIES/PIP_TIMEOUT harden the `pip install tox tox-uv` bootstrap; once
# tox-uv is in, tox provisions its envs and installs deps with uv, so
# UV_HTTP_TIMEOUT raises uv's per-request socket timeout to match. All are read
# from the environment, covering both the explicit installs below and tox's
# internal ones with no third-party action. UV_PYTHON_DOWNLOADS=never keeps uv
# on the interpreter setup-python provisioned (the matrix Python) rather than
# silently fetching a managed one.
env:
  PIP_RETRIES: "5"
  PIP_TIMEOUT: "60"
  UV_HTTP_TIMEOUT: "60"
  UV_PYTHON_DOWNLOADS: "never"

jobs:
  tox-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
      # tox-uv pulls in uv and makes tox provision envs + install deps with it.
      - run: pip install --upgrade pip
      - run: pip install tox tox-uv
      - run: tox -e lint

  tox-mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
      # tox-uv pulls in uv and makes tox provision envs + install deps with it.
      - run: pip install --upgrade pip
      - run: pip install tox tox-uv
      - run: tox -e mypy

  tox:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]  # macOS is POSIX like Linux; add macos-latest to cover it too
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
        experimental: [false]
        include:
          # Windows on ARM64: a gating row on the latest stable Python so the
          # runtime is exercised on win-arm64 (the released .exe targets it too).
          # One Python version keeps the arm matrix small; the per-commit
          # build.yml binary job covers the dep-install/bundle path there.
          - os: windows-11-arm
            python: '3.14'
            experimental: false
          # Python 3.15 is in beta (final: 2026-10-01). Run it for early signal,
          # but never let it gate CI -> continue-on-error. The risk is aiohttp:
          # it has no cp315 wheels yet, so pip falls back to building it from
          # source against a beta C-API, which may fail. allow-prereleases lets
          # setup-python pick up the beta (it's a no-op for the stable rows).
          - os: ubuntu-latest
            python: '3.15'
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      # tox-uv pulls in uv and makes tox provision envs + install deps with it.
      - run: pip install --upgrade pip
      - run: pip install tox tox-uv
      - run: tox -e py
      # Publish coverage to Codecov. Every matrix cell uploads its own
      # coverage.xml; Codecov merges them by flag into one combined number, so
      # POSIX-only paths (privilege drop, user/group) that Windows skips still
      # count. fail_ci_if_error stays false so a Codecov outage never reds the
      # build, and the experimental rows (continue-on-error) don't gate uploads.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python }}
          fail_ci_if_error: false
