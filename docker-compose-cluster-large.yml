# A TEN-node cronstable cluster for watching leader election and, especially,
# `distribution: spread` fan a larger, CPU-heavy job set out across the cluster.
#
#   docker compose -f docker-compose-cluster-large.yml up --build      # start
#   docker compose -f docker-compose-cluster-large.yml logs -f         # logs
#   docker stats                                                       # watch CPU
#   docker compose -f docker-compose-cluster-large.yml down -v         # stop + wipe
#
# Ten nodes (cronstable-a .. cronstable-j) are deployed from one identical job set
# (example/cluster-large/jobs.yaml, 14 jobs, six CPU-heavy). Each node's cluster
# config is generated at start by example/cluster-large/node-entrypoint.sh from
# environment variables, so the compose file needs no per-node peer lists: every
# node shares one CLUSTER_HOSTS list and drops itself by NODE_NAME.
#
# Dashboards: cronstable-a..j on host ports 8080..8089 (e.g. http://localhost:8080/).
#
# DISTRIBUTION (defaults to "spread"): with spread, each leader-gated job gets
# its own per-job owner via rendezvous hashing, so the 12 Leader/PreferLeader
# jobs (and the CPU-heavy ones) fan out across the ten nodes. Watch `docker
# stats` and you'll see CPU spread around. Flip to a single leader to see the
# contrast (ONE node runs every Leader job and all CPU burns at once):
#
#   DISTRIBUTION=single-leader docker compose -f docker-compose-cluster-large.yml up -d
#
# THINGS TO TRY
#   1. Converge:   curl -s localhost:8080/cluster | python -m json.tool
#                  (size 10, quorum 6, distribution "spread", quorate true)
#   2. See the spread: for p in $(seq 8080 8089); do \
#        curl -s localhost:$p/jobs | python -c 'import sys,json; \
#        [print(j["name"],"->",j.get("clusterOwner")) for j in json.load(sys.stdin) \
#         if j.get("clusterPolicy") in ("Leader","PreferLeader")]'; break; done
#   3. Watch CPU fan out:  docker stats   (vs DISTRIBUTION=single-leader -> one hot node)
#   4. Fail nodes:  docker compose -f docker-compose-cluster-large.yml stop cronstable-a cronstable-b
#      quorum (6 of 10) survives up to 4 failures; the owned jobs of stopped
#      nodes are reassigned to survivors. Stop 5+ and the cluster loses quorum
#      and Leader jobs stand down (PreferLeader keeps going).
#
# NOTE ON SIZE: 10 is an EVEN cluster size, so cronstable logs a warning at start
# (quorum 6 tolerates 4 failures, the same as 9; the 10th node only adds
# something that can fail). It is fine for this demo; for real use prefer an odd
# count (9 or 11).
#
# RESOURCES: ten containers plus several one-core CPU burns per minute will load
# your machine. Reduce by stopping some nodes, or trim jobs in
# example/cluster-large/jobs.yaml.

x-cluster-hosts: &cluster_hosts "cronstable-a:8443,cronstable-b:8443,cronstable-c:8443,cronstable-d:8443,cronstable-e:8443,cronstable-f:8443,cronstable-g:8443,cronstable-h:8443,cronstable-i:8443,cronstable-j:8443"

x-node-env: &node-env
  CLUSTER_HOSTS: *cluster_hosts
  DISTRIBUTION: ${DISTRIBUTION:-spread}
  ELECT_LEADER: "true"
  INTERVAL: "10"
  DRIFT_AFTER: "2"

x-node: &node
  build:
    context: .
  image: cronstable-cluster:local       # built once, reused by all ten nodes
  entrypoint: ["sh", "/node-entrypoint.sh"]
  restart: unless-stopped
  depends_on:
    certgen:
      condition: service_completed_successfully
  volumes:
    - ./example/cluster-large/jobs.yaml:/config/jobs.yaml:ro
    - ./example/cluster-large/node-entrypoint.sh:/node-entrypoint.sh:ro
    - cluster-large-certs:/certs:ro

services:
  # The nodes mount this same `cluster-large-certs` volume read-only, so the CA
  # signing key (ca.key) certgen leaves here is technically visible to them, a
  # demo-only shortcut (certs are minted in place). gen-certs.sh restricts the
  # private keys to owner-read for the runtime uid; in production keep ca.key off
  # the nodes (they need only their leaf key+cert and the CA public cert ca.pem).
  certgen:
    image: alpine:3.20
    command: ["sh", "/gen-certs.sh"]
    volumes:
      - cluster-large-certs:/certs
      - ./example/cluster-large/gen-certs.sh:/gen-certs.sh:ro

  cronstable-a: { <<: *node, hostname: cronstable-a, ports: ["8080:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-a } }
  cronstable-b: { <<: *node, hostname: cronstable-b, ports: ["8081:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-b } }
  cronstable-c: { <<: *node, hostname: cronstable-c, ports: ["8082:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-c } }
  cronstable-d: { <<: *node, hostname: cronstable-d, ports: ["8083:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-d } }
  cronstable-e: { <<: *node, hostname: cronstable-e, ports: ["8084:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-e } }
  cronstable-f: { <<: *node, hostname: cronstable-f, ports: ["8085:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-f } }
  cronstable-g: { <<: *node, hostname: cronstable-g, ports: ["8086:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-g } }
  cronstable-h: { <<: *node, hostname: cronstable-h, ports: ["8087:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-h } }
  cronstable-i: { <<: *node, hostname: cronstable-i, ports: ["8088:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-i } }
  cronstable-j: { <<: *node, hostname: cronstable-j, ports: ["8089:8080"], environment: { <<: *node-env, NODE_NAME: cronstable-j } }

volumes:
  cluster-large-certs:
