# A three-node cronstable cluster with mutual-TLS peer attestation and leader
# election — a playground for the clustering features.
#
#   docker compose -f example/cluster/docker-compose.yml up --build      # start
#   docker compose -f example/cluster/docker-compose.yml logs -f         # watch output
#   docker compose -f example/cluster/docker-compose.yml down            # stop
#   docker compose -f example/cluster/docker-compose.yml down -v         # stop + wipe certs
#
# Three nodes (cronstable-a, -b, -c) are deployed from one identical job set
# (example/cluster/jobs.yaml) plus a per-node cluster section that gives each
# its TLS identity and peer list. A one-shot `certgen` service mints a throwaway
# cluster CA and one cert per node (SAN = service name) into a shared volume
# before the nodes start.
#
# Each node serves its own dashboard:
#   - cronstable-a -> http://localhost:8080/
#   - cronstable-b -> http://localhost:8081/
#   - cronstable-c -> http://localhost:8082/
# Scroll to the "cluster" panel at the bottom of any dashboard to see the peer
# table, the agreement tally, the quorum, and which node is the leader.
#
# THINGS TO TRY
# -------------
# 1. Watch it converge. On startup each node reports its peers "unknown" (not
#    yet polled; "unreachable" if a poll fails while a container is still
#    starting), then "agreed" within ~10s (the poll interval). The leader is
#    "cronstable-a" (the lowest node name). Confirm with:
#        curl -s localhost:8080/cluster | jq        # is_leader: true
#        curl -s localhost:8081/cluster | jq        # leader: "cronstable-a"
#
# 2. Compare the policies. Open the job drawers / history on all three:
#        - tick-every-node   (EveryNode)   -> runs on ALL three nodes
#        - tick-leader-only  (Leader)      -> runs ONLY on the leader (cronstable-a)
#        - tick-prefer-leader(PreferLeader)-> runs on the lowest reachable node
#
# 3. Fail the leader.   docker compose -f example/cluster/docker-compose.yml stop cronstable-a
#    cronstable-b and cronstable-c still see each other -> quorum holds (2 of 3), and
#    leadership moves to cronstable-b. tick-leader-only now advances on 8081.
#
# 4. Lose quorum.       docker compose -f example/cluster/docker-compose.yml stop cronstable-a cronstable-b
#    The lone survivor (cronstable-c) can see only itself: 1 of 3 is below quorum, so
#    it STANDS DOWN — tick-leader-only stops running anywhere (the safety/
#    liveness trade). tick-every-node keeps running on cronstable-c regardless.
#    Bring them back:   docker compose -f example/cluster/docker-compose.yml start cronstable-a cronstable-b
#
# 5. Manual triggers ignore the leader. Hit "Run now" on `run-me-anywhere` from
#    a follower's dashboard (8081/8082) — it runs there. Manual triggers and
#    retries are never leader-gated.
#
# 6. Cause drift. Drift is a mismatched SHARED job set (jobs.yaml), not the
#    per-node cluster section, so give ONE node a different jobs.yaml:
#        cp example/cluster/jobs.yaml example/cluster/jobs-drift.yaml
#        # edit jobs-drift.yaml: change any job (e.g. its command or schedule)
#    then point cronstable-c at it by editing this file's cronstable-c jobs bind mount:
#        ./jobs-drift.yaml:/etc/cronstable.d/jobs.yaml:ro
#    and recreate just that node:
#        docker compose -f example/cluster/docker-compose.yml up -d cronstable-c
#    cronstable-c's job-set id now differs, so cronstable-a and cronstable-b report it
#    "drifted" (after driftAfter=2 rounds) on their cluster panels.
#
# 7. Spread the load. By default ONE leader (cronstable-a) runs every Leader job.
#    Uncomment `distribution: spread` in ALL THREE example/cluster/node-*.yaml
#    files and recreate (`docker compose -f example/cluster/docker-compose.yml up -d`).
#    Now each leader-gated job is owned by a (possibly different) node via
#    rendezvous hashing, so the work fans out instead of piling on the leader.
#    With these job names and all three nodes healthy you will see:
#        tick-leader-only    -> runs on cronstable-c
#        tick-prefer-leader  -> runs on cronstable-b
#    (vs both on cronstable-a under the default single-leader mode). The cluster
#    panel shows the role as "spread (per-job owner)" and each job's drawer /
#    `curl -s localhost:8080/jobs` shows its "clusterOwner". Same quorum gate,
#    same guarantee — purely a load optimization.
#
#    For a bigger playground (10 nodes, more jobs, several CPU-heavy, spread on
#    by default so you can watch the load fan out in `docker stats`), see
#    example/cluster-large/docker-compose.yml.

x-cronstable-node: &cronstable-node
  build:
    context: ../..
  image: cronstable-cluster:local      # built once, reused by all three nodes
  restart: unless-stopped
  depends_on:
    certgen:
      condition: service_completed_successfully

services:
  # One-shot: generate the cluster CA + per-node certs into the shared volume,
  # then exit. The nodes wait for this to finish successfully.
  #
  # The nodes mount this same `cluster-certs` volume read-only, so the CA signing
  # key (ca.key) that certgen leaves here is technically visible to them. That is
  # a demo-only shortcut (certs are minted in place). gen-certs.sh restricts the
  # private keys to owner-read for the runtime uid; in production keep ca.key off
  # the nodes entirely; they need only their leaf key+cert and the CA public
  # cert (ca.pem) to verify peers.
  certgen:
    image: alpine:3.20
    command: ["sh", "/gen-certs.sh"]
    volumes:
      - cluster-certs:/certs
      - ./gen-certs.sh:/gen-certs.sh:ro

  cronstable-a:
    <<: *cronstable-node
    container_name: cronstable-a
    hostname: cronstable-a              # also sets $HOSTNAME, used in the job output
    ports:
      - "8080:8080"                 # dashboard; 8443 (cluster mTLS) stays internal
    volumes:
      - ./jobs.yaml:/etc/cronstable.d/jobs.yaml:ro
      - ./node-a.yaml:/etc/cronstable.d/cluster.yaml:ro
      - cluster-certs:/certs:ro

  cronstable-b:
    <<: *cronstable-node
    container_name: cronstable-b
    hostname: cronstable-b
    ports:
      - "8081:8080"
    volumes:
      - ./jobs.yaml:/etc/cronstable.d/jobs.yaml:ro
      - ./node-b.yaml:/etc/cronstable.d/cluster.yaml:ro
      - cluster-certs:/certs:ro

  cronstable-c:
    <<: *cronstable-node
    container_name: cronstable-c
    hostname: cronstable-c
    ports:
      - "8082:8080"
    volumes:
      - ./jobs.yaml:/etc/cronstable.d/jobs.yaml:ro
      - ./node-c.yaml:/etc/cronstable.d/cluster.yaml:ro
      - cluster-certs:/certs:ro

volumes:
  cluster-certs:
