# Per-node cluster section for cronstable-b (mounted as cluster.yaml on this node).
# See node-a.yaml for the annotated version.
cluster:
  listen: "0.0.0.0:8443"
  tls:
    ca:   /certs/ca.pem
    cert: /certs/cronstable-b.pem       # this node's cert (SAN = cronstable-b)
    key:  /certs/cronstable-b.key
  peers:                            # every OTHER member
    - host: cronstable-a:8443
    - host: cronstable-c:8443
  nodeName: cronstable-b
  electLeader: true
  interval: 10
  driftAfter: 2
  observability:                    # share CPU/memory across the cluster
    shareNodeStats: true            # (match on all nodes)
  # distribution: spread            # opt-in; must match the other nodes
