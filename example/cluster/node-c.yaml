# Per-node cluster section for yacron-c (mounted as cluster.yaml on this node).
# See node-a.yaml for the annotated version.
cluster:
  listen: "0.0.0.0:8443"
  tls:
    ca:   /certs/ca.pem
    cert: /certs/yacron-c.pem       # this node's cert (SAN = yacron-c)
    key:  /certs/yacron-c.key
  peers:                            # every OTHER member
    - host: yacron-a:8443
    - host: yacron-b:8443
  nodeName: yacron-c
  electLeader: true
  interval: 10
  driftAfter: 2
  observability:                    # share CPU/memory across the cluster
    shareNodeStats: true            # (match on all nodes)
  # distribution: spread            # opt-in; must match the other nodes
