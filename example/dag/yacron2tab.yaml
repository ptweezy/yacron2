# yacron2 orchestration: a durable DAG.
#
# A `dags:` section turns the scheduler into a small, durable workflow engine.
# Each DAG is a graph of tasks with `dependsOn` edges; the daemon runs them in
# dependency order, one dag_run at a time per schedule tick, and every step is
# recorded on the same durable store the rest of yacron2's state features use.
# There is NO new coordination service: a dag_run is one mutable document, a
# task is an ordinary job invocation, cross-task data (XCom) rides the artifact
# store, and a fleet advances each run under a single lease so a task never
# double-launches. See the "Orchestration and DAGs" wiki page.
#
# DAGs require a `state` section with the loopback endpoint enabled (the tasks
# reach the store -- and their XCom -- through `yacron2 xcom|artifact|state`).

state:
  path: /var/lib/yacron2/state
  jobApi:
    enabled: true

dags:
  - name: nightly-etl
    # The same schedule grammar as a job (cron string or the object form),
    # plus the same catch-up discipline: onMissed run-all/run-once/skip and
    # startingDeadlineSeconds bound how far a restart replays.
    schedule: "0 2 * * *"
    onMissed: run-once
    startingDeadlineSeconds: 43200   # only replay a miss < 12h old
    retainRuns: 30                   # keep the newest 30 terminal runs

    tasks:
      # 1. A plain task. It publishes a JSON list as an XCom output that a
      # downstream task fans out over.
      - id: list-partitions
        command: |
          set -eu
          # ... discover today's partitions ...
          echo '["eu", "us", "apac"]' | yacron2 xcom push --key partitions

      # 2. Dynamic mapping (fan-out): this task expands into one instance per
      # item in list-partitions' `partitions` XCom. Each instance gets its
      # item in $YACRON2_DAG_MAP_ITEM and its index in $YACRON2_DAG_MAP_INDEX.
      - id: load-partition
        dependsOn:
          - list-partitions
        expand:
          fromTask: list-partitions
          key: partitions
        retries: 2                   # per-task retries (2 -> 3 attempts)
        retryDelaySeconds: 30
        executionTimeout: 3600
        command: |
          set -eu
          echo "loading partition $YACRON2_DAG_MAP_ITEM (#$YACRON2_DAG_MAP_INDEX)"
          # ... load work ...

      # 3. A sensor: polls an external condition on a bounded, jittered,
      # durable schedule. Exit 0 = condition met (success); any non-zero =
      # not yet, poll again after pokeIntervalSeconds until pokeTimeoutSeconds.
      - id: wait-for-upstream-feed
        type: sensor
        dependsOn:
          - load-partition
        pokeIntervalSeconds: 60
        pokeTimeoutSeconds: 7200
        pokeJitterSeconds: 10
        command: "test -f /data/feeds/$(date +%F).ready"

      # 4. An approval gate: blocks the graph until a human/API approves it
      # (POST .../tasks/publish-gate/decision on the control API, or the
      # dashboard). onReject: skip cascades a `skipped` downstream instead of
      # a failure.
      - id: publish-gate
        type: approval
        dependsOn:
          - wait-for-upstream-feed
        onReject: skip

      # 5. A final task, reached only once the gate is approved. all_done runs
      # it regardless of upstream outcome; the default all_success would skip
      # it if the gate were rejected-as-skip.
      - id: publish
        dependsOn:
          - publish-gate
        command: "echo publishing the day's load"

  # A manual-only DAG (no schedule): it never fires on its own; trigger it with
  # `POST /dags/adhoc-report/trigger` on the control API (or a backfill).
  - name: adhoc-report
    tasks:
      - id: extract
        command: "echo extract | yacron2 xcom push --key rows"
      - id: report
        dependsOn:
          - extract
        command: "yacron2 xcom pull --task extract --key rows"
