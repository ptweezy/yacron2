---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yacron2demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yacron2demo
  template:
    metadata:
      labels:
        app: yacron2demo
    spec:
      containers:
      - name: yacron2demo
        image: yacron2demo
        imagePullPolicy: Never
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        env:
          - name: PYTHONIOENCODING
            value: "utf-8"
