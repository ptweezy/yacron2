# cronstable with the etcd leadership backend.
#
# Several instances run from this same config; only the holder of a lease-bound
# etcd key (electionName below) runs the Leader-gated jobs. The holder keeps a
# short-TTL lease alive; if it dies, the lease expires, etcd deletes the key,
# and another instance's create-if-absent transaction wins -- a fenced,
# exactly-once election while etcd is reachable.
#
# The backend talks to etcd over its v3 gRPC-gateway JSON/HTTP API using the
# core aiohttp dependency (no etcd3/grpc client), so it needs no extra
# dependency and runs on every architecture.
cluster:
  backend: etcd
  # nodeName defaults to the hostname; it is also the value written at the
  # election key, so the dashboard/leader_name show which instance holds it.
  etcd:
    endpoints:
      - http://etcd:2379       # may list several for failover
    electionName: cronstable/leader
    ttl: 15                    # lease time-to-live, seconds
    # username: root
    # password:
    #   fromEnvVar: ETCD_PASSWORD
    # tls:                     # optional client TLS to https:// endpoints
    #   ca: /etc/etcd/ca.pem    # ca alone suffices to trust the server
    #   cert: /etc/etcd/client.pem  # cert + key add mutual TLS; they are
    #   key: /etc/etcd/client.key   # all-or-nothing (set both or neither)

jobs:
  - name: charge-cards            # must not double-run; skip-tolerant
    command: echo "charging cards on $(hostname)"
    schedule: "*/2 * * * *"
    clusterPolicy: Leader

  - name: refresh-cache           # idempotent, must not be skipped
    command: echo "refreshing cache on $(hostname)"
    schedule: "*/1 * * * *"
    clusterPolicy: PreferLeader   # runs anyway if etcd is unreachable

  - name: rotate-local-logs       # genuinely per-node
    command: echo "rotating logs on $(hostname)"
    schedule: "*/5 * * * *"
    clusterPolicy: EveryNode

web:
  listen:
    - http://0.0.0.0:8080
