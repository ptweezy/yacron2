# A local etcd plus two cronstable instances electing a leader through it.
#
#   docker compose -f example/etcd/docker-compose.yml up --build
#
# Then open http://localhost:8080/ and http://localhost:8081/ and watch the
# cluster panel: exactly one instance is the leader (holds the lease-bound
# election key). Stop the leader and the other takes over within ~ttl seconds:
#
#   docker compose -f example/etcd/docker-compose.yml stop cronstable-a
#
# Inspect the election key directly:
#
#   docker compose -f example/etcd/docker-compose.yml exec etcd \
#     etcdctl get cronstable/leader
services:
  etcd:
    # Pin a full patch tag: quay.io/coreos/etcd publishes no major.minor
    # aliases (there is no `v3.5` tag), so anything shorter fails to pull.
    image: quay.io/coreos/etcd:v3.5.32
    command:
      - etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    # No `ports:` mapping on purpose. This demo etcd has NO authentication and
    # speaks plaintext HTTP, so the election key (cronstable/leader) would be
    # world-writable to anything that can reach the host on 2379 -> trivial
    # split-brain. The cronstable nodes reach it over the compose network by its
    # service name (etcd:2379), so it never needs to be published to the host.
    # For local etcdctl poking, run it inside the container instead:
    #   docker compose -f docker-compose.yml exec etcd etcdctl get cronstable/leader
    # If you must publish the client port, bind it to loopback only
    # ("127.0.0.1:2379:2379") and never expose this unauthenticated store
    # beyond localhost.
    # The healthcheck lets the cronstable nodes wait for etcd to be READY (see
    # their depends_on condition), not merely started. Without it the short-form
    # `depends_on: [etcd]` only waits for the container to start, so on first
    # boot the nodes race ahead and their logs show a few transient
    # "etcd round failed: ... connection refused" warnings until etcd is
    # listening. That is harmless and self-heals within a renew period, but the
    # gate keeps first-boot logs clean.
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 2s
      timeout: 2s
      retries: 10

  cronstable-a:
    image: ghcr.io/ptweezy/cronstable:latest
    command: ["-c", "/etc/cronstable/cronstable.yaml"]
    hostname: cronstable-a          # becomes cluster.nodeName / the lease identity
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./cronstable.yaml:/etc/cronstable/cronstable.yaml:ro

  cronstable-b:
    image: ghcr.io/ptweezy/cronstable:latest
    command: ["-c", "/etc/cronstable/cronstable.yaml"]
    hostname: cronstable-b
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./cronstable.yaml:/etc/cronstable/cronstable.yaml:ro
