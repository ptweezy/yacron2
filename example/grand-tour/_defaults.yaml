# =====================================================================
#  Meridian grand tour — shared defaults + custom logging.
#
#  This file is pulled into platform.yaml with `include: [_defaults.yaml]`
#  (see the top of platform.yaml). It is NOT loaded on its own: yacron2 skips
#  any file in a config directory whose name starts with "_" or ".", so the
#  only way it takes effect is through the include. That is exactly what
#  `include:` is for — hoisting common definitions (defaults, reporting,
#  logging) out of the file that uses them.  [feature: include]
#
#  Because we are loaded from a config DIRECTORY, these `defaults:` apply only
#  to the jobs in the file that includes us (platform.yaml). The classic
#  crontab dropped in beside us (legacy.crontab) keeps yacron2's own standard
#  defaults — that is the documented per-file rule for directories.
# =====================================================================

defaults:
  # A string command with no explicit `shell` runs through this shell. Jobs
  # that pass `command` as a list bypass the shell entirely.  [feature: defaults, shell]
  shell: /bin/sh
  # Capture BOTH streams by default so every job's output is tailable in the
  # dashboard log view and available to reports. Individual jobs turn this off
  # (silent-cleanup) or lean on it (the failsWhen / stderr demos).
  captureStdout: true
  captureStderr: true
  # Sample each run's CPU time and peak resident memory. The numbers surface in
  # the dashboard run history, at GET /metrics (yacron2_job_cpu_seconds_total,
  # yacron2_job_last_run_max_rss_bytes) and over statsd — observability only,
  # never changing a run's verdict.  [feature: monitorResources]
  monitorResources: true
  # Inline environment shared by every job here; individual jobs layer more on
  # top, and backup-warehouse additionally pulls an env_file.  [feature: environment]
  environment:
    - key: PYTHONIOENCODING
      value: utf-8
    - key: PLATFORM
      value: meridian
    # Every job can reach the durable state store over this loopback endpoint;
    # the daemon injects the real URL + a per-run token automatically, so this
    # is only here to show the platform name flowing through to job output.

# Custom logging: timestamp every daemon log line and name the logger. This is
# a straight python logging.dictConfig, handed through verbatim.  [feature: logging]
logging:
  version: 1
  disable_existing_loggers: false
  formatters:
    detailed:
      format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
      datefmt: '%Y-%m-%d %H:%M:%S'
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: detailed
      stream: ext://sys.stdout
  root:
    level: INFO
    handlers:
      - console
