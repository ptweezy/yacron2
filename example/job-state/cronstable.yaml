# cronstable with the job-facing state primitives (the durable store, handed to
# the jobs themselves).
#
# A `state` section turns on the durable store; `state.jobApi` (on by default
# whenever `state` is configured) additionally runs a loopback HTTP endpoint
# and injects its address plus a per-run bearer token into every job's
# environment. A job command then reaches the store through the
# `cronstable state|cursor|lock|artifact|idempotent|secret` commands, which are
# thin clients of that endpoint -- no coordination service, no client library,
# just the daemon that is already running the job.
#
# Everything here is opt-in: with no `state` section none of it exists and
# cronstable stays stateless, exactly as before.

state:
  # A local directory gives single-node durability; point this at an Amazon
  # S3 Files / EFS mount and the identical setup coordinates the whole fleet
  # (the locks and cursors below then exclude/converge across every node that
  # mounts it). See the Durable State wiki page.
  path: /var/lib/cronstable/state
  jobApi:
    enabled: true            # the default; set false to keep the durable
                             # scheduler features but expose nothing to jobs
    # listen: http://127.0.0.1:8123   # optional fixed port; default is an
                             # OS-assigned ephemeral port on 127.0.0.1
    maxValueBytes: 1048576   # cap on one KV / cursor value (1 MiB)
    maxArtifactBytes: 67108864   # cap on one artifact payload (64 MiB)
    lockTtlSeconds: 30       # mutex/semaphore lease TTL (renewed by the daemon)

jobs:
  # An incremental ETL job: it reads a durable watermark, processes only rows
  # newer than it, and advances the watermark. The advance is monotonic, so an
  # out-of-order or replayed run can never walk the cursor backwards, and on a
  # shared store several nodes converge on the furthest point.
  - name: incremental-export
    command: |
      set -eu
      since=$(cronstable cursor get watermark 2>/dev/null || echo 0)
      echo "exporting rows with id > $since"
      # ... export work that prints the new maximum id it saw ...
      new_max=$((since + 100))
      cronstable cursor advance watermark "$new_max"
    schedule: "*/5 * * * *"

  # A job that must not run its side effect twice, even across a retry or a
  # duplicate fire on another node. `cronstable idempotent` claims a key once
  # fleet-wide: exit 0 the first time (do the work), exit 5 when the key is
  # already claimed (skip), exit 1 on a transport/store error. Treat 1 as a
  # failure, never as "already done" -- a store outage must not silently
  # drop the side effect.
  - name: charge-invoices
    command: |
      set -eu
      key="invoices-$(date -u +%Y-%m-%d)"
      cronstable idempotent "$key" && rc=0 || rc=$?
      if [ "$rc" -eq 0 ]; then
        echo "charging today's invoices"
        # ... the exactly-once side effect ...
      elif [ "$rc" -eq 5 ]; then
        echo "already charged for today; skipping"
      else
        exit "$rc"    # store unreachable: fail the run, do not skip
      fi
    schedule: "0 * * * *"

  # A job protecting a shared resource with a fleet-wide mutex. `lock run`
  # holds the lock for the duration of the wrapped command and releases it
  # afterwards (and the daemon releases it anyway if the run ends abruptly).
  # `--scope global` shares the lock across different jobs; the default scope
  # is the job's own name.
  - name: compact-database
    command: >
      cronstable lock run db-maintenance --scope global --wait --timeout 60
      -- /usr/local/bin/compact-db.sh
    schedule: "30 3 * * *"

  # A job that publishes a small artifact for a later run (or a peer node) to
  # read back by name, plus a run-scoped secret it fetches from the endpoint
  # rather than from its own environment (so the token never shows in
  # `ps -E` or /proc/<pid>/environ).
  - name: build-report
    command: |
      set -eu
      token=$(cronstable secret get API_TOKEN)
      /usr/local/bin/build-report.sh --token "$token" > /tmp/report.csv
      cronstable artifact put latest-report /tmp/report.csv
      cronstable state set last-report-at "$(date -u +%FT%TZ)"
    schedule: "0 6 * * *"
    secrets:
      # resolved fresh per run and served only to this run over the endpoint;
      # never written to the durable store.
      - name: API_TOKEN
        fromEnvVar: REPORT_API_TOKEN

web:
  listen:
    - http://127.0.0.1:8080
