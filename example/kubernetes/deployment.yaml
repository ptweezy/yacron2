# Minimal RBAC + Deployment for the Kubernetes Lease leadership backend.
#
# The Role grants exactly the verbs the backend needs on the single Lease
# object "cronstable-leader": get (observe) and update (renew / replace / release)
# are pinned to that one Lease by resourceNames; create is a separate rule
# because RBAC does not honor resourceNames on create (the object does not yet
# exist when create is authorized). Apply with:
#
#     kubectl apply -f deployment.yaml
#
# The cronstable config (cronstable.yaml in this directory) is mounted from a
# ConfigMap; create it with:
#
#     kubectl create configmap cronstable --from-file=cronstable.yaml
#
# Then watch leadership move by deleting the holder pod:
#
#     kubectl get lease cronstable-leader -o jsonpath='{.spec.holderIdentity}{"\n"}'
#     kubectl delete pod <that-pod>     # a survivor takes the lease within ~leaseDurationSeconds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cronstable
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cronstable-lease
  # A Role is namespaced: it only grants access to Leases in its OWN namespace
  # (the one you apply it to). If you point the backend at a Lease in a
  # different namespace (cluster.kubernetes.leaseNamespace, see cronstable.yaml),
  # the ServiceAccount has no rights there: every lease call 403s, the node
  # never becomes quorate, and Leader jobs never run (mislogged as "apiserver
  # unreachable"). Put this Role + RoleBinding in THAT namespace (metadata.
  # namespace on both), or convert them to a ClusterRole + ClusterRoleBinding.
rules:
  # get: observe the current holder; update: renew, take over an expired lease,
  # and release on shutdown. Both are restricted to the one Lease the backend
  # uses, so a compromised pod cannot read or hijack any other Lease in the
  # namespace. Keep resourceNames in sync with the lease name (default
  # "cronstable-leader"; set via cluster.kubernetes.leaseName if you change it).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["cronstable-leader"]
    verbs: ["get", "update"]
  # create: first acquire. RBAC cannot scope create by resourceNames (the Lease
  # does not exist yet), so this is its own rule. It only authorizes creating a
  # Lease, not reading or modifying existing ones.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cronstable-lease
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cronstable-lease
subjects:
  - kind: ServiceAccount
    name: cronstable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cronstable
spec:
  # An odd replica count is not required for a lease backend (the store is the
  # authority, not a quorum), but spreading replicas across nodes still helps
  # availability.
  replicas: 3
  selector:
    matchLabels:
      app: cronstable
  template:
    metadata:
      labels:
        app: cronstable
    spec:
      serviceAccountName: cronstable
      # On a graceful stop cronstable clears its holderIdentity (releases the
      # Lease) so a survivor takes over at once instead of waiting out
      # leaseDurationSeconds. That release is a live apiserver call, so the pod
      # needs time to make it during termination: keep terminationGracePeriod-
      # Seconds comfortably above renewDeadlineSeconds (the release is bounded
      # by it). Lowering it below silently loses the fast handoff -- the pod is
      # SIGKILLed mid-release and the peer waits out the full lease instead.
      terminationGracePeriodSeconds: 30
      containers:
        - name: cronstable
          image: ghcr.io/ptweezy/cronstable:latest
          args: ["-c", "/etc/cronstable/cronstable.yaml"]
          # cluster.nodeName (and so the lease identity) defaults to the
          # container hostname, which Kubernetes sets to the pod name -- already
          # unique per replica. cronstable also appends a per-process token to the
          # holderIdentity it writes (e.g. "cronstable-0#a1b2c3d4e5f6"), so even a
          # duplicate identity cannot make two pods both hold the Lease; the
          # dashboard / GET /cluster show the readable name without the suffix.
          volumeMounts:
            - name: cronstable
              mountPath: /etc/cronstable
              readOnly: true
      volumes:
        - name: cronstable
          configMap:
            name: cronstable
