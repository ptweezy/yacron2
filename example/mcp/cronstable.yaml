# cronstable with the MCP server enabled, for AI agents.
#
# Brought up by example/mcp/docker-compose.yml, alongside this file. The `web`
# section turns on the HTTP API + dashboard; the `mcp` section exposes the
# Model Context Protocol server at POST /mcp so an agent (Claude, Cursor,
# VS Code Copilot, ...) can observe and control these jobs. The jobs are
# deliberately varied so an agent has something interesting to reason about: a
# steady heartbeat, a job that fails (for the triage prompt), a long-runner you
# can catch "running", and a manual "run on demand" job.
#
# Open http://localhost:8080/ for the dashboard, and point an MCP client at
# http://localhost:8080/mcp (bearer token from CRONSTABLE_WEB_TOKEN). See
# example/mcp/README.md for the full walkthrough.

defaults:
  shell: /bin/bash
  captureStdout: true
  captureStderr: true

web:
  # 0.0.0.0 so both the dashboard and /mcp are reachable through the published
  # Docker port. Because this is a routable address, `mcp` REQUIRES a token
  # (cronstable fails closed otherwise) -- it is supplied here.
  listen:
    - http://0.0.0.0:8080
  authToken:
    fromEnvVar: CRONSTABLE_WEB_TOKEN   # also gates /mcp

mcp:
  enabled: true
  # DEMO ONLY: writes are enabled so an agent can run/cancel jobs. Leave the
  # default `readOnly: true` in production unless you deliberately want an
  # agent to control the scheduler.
  readOnly: false
  toolsets:
    - observe
    - act
    - dags
    - state

jobs:
  # A first run the instant cronstable starts, so an agent's cron_list_runs
  # has history immediately.
  - name: welcome
    command: echo "MCP demo started on $HOSTNAME at $(date -u +%T) UTC"
    schedule: "@reboot"

  # Steady green: every minute, always succeeds.
  - name: heartbeat
    command: echo "heartbeat at $(date -u +%H:%M:%S) UTC"
    schedule: "* * * * *"

  # Fails on purpose every 2 minutes -- ask the agent to run the
  # `triage_job_failure` prompt against this one.
  - name: flaky-export
    command: |
      echo "exporting..."
      echo "connection refused: db:5432" 1>&2
      exit 1
    schedule: "*/2 * * * *"
    onFailure:
      retry:
        maximumRetries: 2
        initialDelay: 5
        maximumDelay: 20
        backoffMultiplier: 2

  # Long-running, so an agent can catch it "running" and tail its live logs.
  - name: slow-report
    command: |
      echo "building report..."
      for i in $(seq 1 20); do echo "step $i / 20"; sleep 3; done
      echo "done"
    schedule: "*/5 * * * *"

  # Never scheduled: an agent starts it with cron_run_job (confirm=true).
  - name: on-demand-sync
    command: echo "manual sync ran at $(date -u +%T) UTC"
    schedule: "0 0 31 2 *"    # 31 Feb: never fires on its own
