# Pulse (clustered) — a THREE-NODE, second-level uptime / SLA monitor with
# mutual-TLS peer attestation and leader election.
#
#   docker compose -f example/pulse-cluster/docker-compose.yml up --build     # start
#   docker compose -f example/pulse-cluster/docker-compose.yml logs -f        # watch
#   docker compose -f example/pulse-cluster/docker-compose.yml down           # stop
#   docker compose -f example/pulse-cluster/docker-compose.yml down -v        # stop + wipe certs
#
# Three nodes (cronstable-a, -b, -c) run one identical pulse job set
# (example/pulse-cluster/jobs.yaml) plus a per-node cluster section. A one-shot
# `certgen` mints a throwaway CA + one cert per node into a shared volume first.
#
# Each node serves its own dashboard:
#   - cronstable-a -> http://localhost:8080/   (the leader while all three are up)
#   - cronstable-b -> http://localhost:8081/
#   - cronstable-c -> http://localhost:8082/   (also the PULSE_TARGET — a follower)
#
# WHAT TO WATCH
# -------------
# 1. Coordinated second-level probing. `liveness-probe` (EveryNode, every 5s)
#    advances on ALL three dashboards — three independent vantage points on the
#    upstream. `latency-slo` (Leader, every 2s) advances on cronstable-a ONLY, so
#    the upstream is sampled once, not three times. Both count down in SECONDS.
#
# 2. Fail the leader.   docker compose -f example/pulse-cluster/docker-compose.yml stop cronstable-a
#    Quorum holds (2 of 3); leadership moves to cronstable-b, and `latency-slo`
#    resumes on 8081. The upstream (cronstable-c) is still up, so liveness stays
#    green everywhere. This is a pure LEADER-FAILOVER demo.
#
# 3. Simulate an upstream outage.  docker compose -f example/pulse-cluster/docker-compose.yml stop cronstable-c
#    cronstable-c is the PULSE_TARGET, so within ~5s `liveness-probe` goes RED on
#    the remaining nodes (8080/8081) and their reports print the on-call PAGE
#    line — the outage is caught from every surviving vantage point. Quorum is
#    unaffected (a+b = 2 of 3), so this is a pure OUTAGE-DETECTION demo, cleanly
#    separate from #2. Bring it back: `... start cronstable-c`.
#
# 4. Spread the Leader work. Uncomment `distribution: spread` in ALL THREE
#    example/pulse-cluster/node-*.yaml and recreate. Now `latency-slo` and
#    `sla-rollup` get per-job owners (rendezvous-hashed), so they can land on
#    different nodes instead of both on the leader.
#
# For the single-node version, see example/pulse-monitor/docker-compose.yml.
# For the clustering feature tour without the monitoring theme, see
# example/cluster/docker-compose.yml.

x-cronstable-node: &cronstable-node
  build:
    context: ../..
  image: cronstable-pulse-cluster:local   # built once, reused by all three nodes
  restart: unless-stopped
  depends_on:
    certgen:
      condition: service_completed_successfully

services:
  # One-shot: generate the cluster CA + per-node certs, then exit.
  certgen:
    image: alpine:3.20
    command: ["sh", "/gen-certs.sh"]
    volumes:
      - pulse-certs:/certs
      - ./gen-certs.sh:/gen-certs.sh:ro

  cronstable-a:
    <<: *cronstable-node
    container_name: cronstable-a
    hostname: cronstable-a                 # sets $HOSTNAME, used in the job output
    ports:
      - "8080:8080"                    # dashboard; 8443 (cluster mTLS) stays internal
    volumes:
      - ./jobs.yaml:/etc/cronstable.d/jobs.yaml:ro
      - ./node-a.yaml:/etc/cronstable.d/cluster.yaml:ro
      - pulse-certs:/certs:ro

  cronstable-b:
    <<: *cronstable-node
    container_name: cronstable-b
    hostname: cronstable-b
    ports:
      - "8081:8080"
    volumes:
      - ./jobs.yaml:/etc/cronstable.d/jobs.yaml:ro
      - ./node-b.yaml:/etc/cronstable.d/cluster.yaml:ro
      - pulse-certs:/certs:ro

  cronstable-c:
    <<: *cronstable-node
    container_name: cronstable-c
    hostname: cronstable-c
    ports:
      - "8082:8080"
    volumes:
      - ./jobs.yaml:/etc/cronstable.d/jobs.yaml:ro
      - ./node-c.yaml:/etc/cronstable.d/cluster.yaml:ro
      - pulse-certs:/certs:ro

volumes:
  pulse-certs:
