# Per-node cluster section for cronstable-b (mounted as cluster.yaml on this node).
# See node-a.yaml for the annotated version; only the identity differs.
cluster:
  listen: "0.0.0.0:8443"
  tls:
    ca:   /certs/ca.pem
    cert: /certs/cronstable-b.pem       # SAN = cronstable-b
    key:  /certs/cronstable-b.key
  peers:
    - host: cronstable-a:8443
    - host: cronstable-c:8443
  nodeName: cronstable-b
  electLeader: true
  interval: 10
  driftAfter: 2
  # distribution: spread            # set on ALL three node files together
