# Per-node cluster section for cronstable-c (mounted as cluster.yaml on this node).
# See node-a.yaml for the annotated version; only the identity differs.
#
# NOTE: cronstable-c is also the default PULSE_TARGET (a follower, never the leader),
# so "stop cronstable-c" simulates an UPSTREAM OUTAGE, while "stop cronstable-a"
# simulates a LEADER failover — two independent experiments (see the README).
cluster:
  listen: "0.0.0.0:8443"
  tls:
    ca:   /certs/ca.pem
    cert: /certs/cronstable-c.pem       # SAN = cronstable-c
    key:  /certs/cronstable-c.key
  peers:
    - host: cronstable-a:8443
    - host: cronstable-b:8443
  nodeName: cronstable-c
  electLeader: true
  interval: 10
  driftAfter: 2
  # distribution: spread            # set on ALL three node files together
