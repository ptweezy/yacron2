# Pulse — a real-time uptime / SLA monitor built on cronstable second-level scheduling.
#
# The problem: you run a latency-critical service (a payment API, an auth
# gateway, an edge cache) with a tight SLO. A classic once-a-minute cron probe
# leaves a blind spot of up to 60 seconds — long enough to miss a whole outage
# between two checks. You want to KNOW within a few seconds.
#
# The solution: cronstable can schedule at *second* granularity, so this config
# probes every 2–5 seconds, heartbeats every 10, and still rolls up a summary
# once a minute — all in one daemon, all visible on the dashboard.
#
# It is self-contained: the "service under test" is cronstable's OWN web API
# (GET /status on the dashboard below), so the monitor watches its own liveness
# and there is nothing else to run. Point it at a real service by setting
# PULSE_TARGET (and tighten/relax PULSE_BUDGET_MS) in the environment.
#
#   # in a container (publishes the dashboard on :8080)
#   docker compose -f example/pulse-monitor/docker-compose.yml up --build
#
#   # or locally, from a checkout
#   cronstable -c example/pulse-monitor/cronstable.yaml
#
# Then open http://localhost:8080/ and watch the probes' next-run countdowns
# tick DOWN IN SECONDS (not minutes). To see it catch an outage, point the
# probes at a dead port:  PULSE_TARGET=http://127.0.0.1:9/nope
#
# Because a second-level job makes the whole scheduler tick every second, note
# that the minute-cadence `sla-rollup` below still fires exactly ONCE per minute
# (cronstable de-duplicates each job per scheduling slot) — sub-minute and
# per-minute jobs coexist cleanly in the same config.

defaults:
  # capture both streams so every probe's verdict shows up in the dashboard log
  captureStdout: true
  captureStderr: true
  environment:
    - key: PYTHONIOENCODING
      value: utf-8
    # the endpoint under test — defaults to this node's own dashboard so the
    # example runs with no external service. Override to monitor something real.
    - key: PULSE_TARGET
      value: http://127.0.0.1:8080/status
    # latency SLO for the budget probe, in milliseconds
    - key: PULSE_BUDGET_MS
      value: "250"

web:
  # 0.0.0.0 so the dashboard is reachable through the published Docker port;
  # the probes below reach the same server over 127.0.0.1.
  listen:
    - http://0.0.0.0:8080

jobs:
  # -- one-shot banner so the dashboard has a first run to show immediately ----
  - name: banner
    command: echo "🩺 Pulse monitor online — watching $PULSE_TARGET (SLO ${PULSE_BUDGET_MS} ms)"
    schedule: "@reboot"

  # -- liveness probe: is the service reachable and returning 200? -------------
  # Every 5 seconds (object `second:` spelling). A single missed/slow beat is an
  # outage you want paged on, so it fails closed and reports to the on-call
  # shell hook. Forbid + executionTimeout keep a hung probe from stacking up.
  - name: liveness-probe
    schedule:
      second: "*/5"
    concurrencyPolicy: Forbid
    executionTimeout: 4
    # an argv list (not a string): the command runs directly, with no shell
    # involved, so there is no /bin/sh or heredoc dependency. python3 ships in
    # the cronstable image (it IS a Python app).
    command:
      - python3
      - -c
      - |
        import os, sys, time, urllib.request
        url = os.environ["PULSE_TARGET"]
        t0 = time.perf_counter()
        try:
            with urllib.request.urlopen(url, timeout=3) as resp:
                resp.read()
                code = resp.status
        except Exception as exc:
            print(f"DOWN   {url}: {exc}", file=sys.stderr)
            sys.exit(1)
        rtt = (time.perf_counter() - t0) * 1000
        print(f"UP     {url}  HTTP {code}  {rtt:6.1f} ms")
        sys.exit(0 if code == 200 else 1)
    onFailure:
      report:
        shell:
          # a stand-in pager: in a real deployment this would be a `webhook`
          # (Slack/PagerDuty) or `mail` reporter. See the Reporting docs.
          command: echo "🚨 PAGE on-call — $CRONSTABLE_JOB_NAME failed ($CRONSTABLE_FAIL_REASON)"

  # -- latency SLO probe: is the service fast ENOUGH? -------------------------
  # Every 2 seconds (7-field crontab string spelling: the leading field is the
  # second). A response slower than the budget is a soft-SLO breach: it writes
  # to stderr, and `failsWhen.producesStderr` turns that into a failed run.
  - name: latency-slo
    schedule: "*/2 * * * * * *"
    executionTimeout: 4
    failsWhen:
      producesStdout: false   # a normal "within SLO" line on stdout is fine
      producesStderr: true    # …but any stderr (a breach or error) fails the run
      nonzeroReturn: true
    command:
      - python3
      - -c
      - |
        import os, sys, time, urllib.request
        url = os.environ["PULSE_TARGET"]
        budget = float(os.environ["PULSE_BUDGET_MS"])
        t0 = time.perf_counter()
        try:
            urllib.request.urlopen(url, timeout=3).read()
        except Exception as exc:
            print(f"unreachable: {exc}", file=sys.stderr)
            sys.exit(1)
        rtt = (time.perf_counter() - t0) * 1000
        if rtt > budget:
            print(f"SLO BREACH: {rtt:.1f} ms > {budget:.0f} ms budget", file=sys.stderr)
        else:
            print(f"within SLO: {rtt:6.1f} ms  (budget {budget:.0f} ms)")

  # -- heartbeat: prove the MONITOR ITSELF is alive --------------------------
  # Every 10 seconds (object form). A downstream dead-man's-switch (or just your
  # own eyes on the dashboard countdown) can tell the watcher stopped watching.
  - name: heartbeat
    schedule:
      second: "*/10"
    command: echo "♥ pulse $(date -u +%H:%M:%S)Z — monitor alive"

  # -- rollup: a per-minute summary that coexists with the second jobs -------
  # Plain 5-field minute schedule. Even though the scheduler is ticking every
  # second (for the probes above), this fires exactly ONCE per minute.
  - name: sla-rollup
    schedule: "* * * * *"
    command: echo "▣ $(date -u +%H:%M)Z rollup — ~30 liveness + ~30 latency probes this minute; history is in the dashboard"
