# Zen screensaver demo — a single, deliberately CALM cronstable node.
#
# The zen all-clear screensaver only appears when a wallboard is idle AND healthy
# (nothing Running, nothing Failing). This config keeps the board calm so you can
# actually see it.
#
# This is a single, non-clustered node, so (unlike the clustered ACME demo) the
# dashboard shows no cluster panel: no Owner column and no quorum/leader status.
#
#   docker compose -f example/zen-demo/docker-compose.yml up --build      # start
#   docker compose -f example/zen-demo/docker-compose.yml down            # stop and remove
#
# Then open http://localhost:8080/ , optionally set Settings -> "Zen idle" -> 10s,
# press  w  to enter the wallboard, and wait. See
# example/zen-demo/cronstable.yaml for the walkthrough.

services:
  cronstable-zen:
    build:
      context: ../..
    container_name: cronstable-zen
    ports:
      - "8080:8080"
    volumes:
      - ./cronstable.yaml:/etc/cronstable.d/cronstable.yaml:ro
    restart: unless-stopped
