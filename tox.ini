[tox]
envlist = py310, py311, py312, py313, py314, lint, mypy

[testenv:lint]
description = lint source code
# ruff only reads the source tree, so don't build/install the package (which
# would impose the project's requires-python on the lint interpreter).
skip_install = true
deps =
    ruff
commands =
    ruff check yacron2
    ruff format --check yacron2


[testenv:mypy]
basepython=python3
# mypy analyzes the source tree directly; no need to install the package.
skip_install = true
deps=
	mypy
commands=mypy -p yacron2 --ignore-missing-imports


[testenv]
deps = -rrequirements_dev.txt
setenv =
    PYTHONPATH = {toxinidir}

# --cov-fail-under gates the build on coverage: a change that drops a tested
# path to zero coverage fails CI instead of merging green. The floor is set
# conservatively below the measured branch coverage (POSIX ~86%, Windows lower
# since the POSIX-only privilege-drop/user-group tests skip there). Ratchet it
# up as coverage rises; never down without a recorded reason.
commands = pytest --color=yes -vv --cov=yacron2 --cov-report=term-missing --cov-fail-under=82
