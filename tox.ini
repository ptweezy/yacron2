[tox]
envlist = py313, py314, lint, mypy

[testenv:lint]
description = lint source code
# ruff only reads the source tree, so don't build/install the package (which
# would impose the project's requires-python on the lint interpreter).
skip_install = true
deps =
    ruff
commands =
    ruff check yacron2
    ruff format --check yacron2


[testenv:mypy]
basepython=python3
# mypy analyses the source tree directly; no need to install the package.
skip_install = true
deps=
	mypy
commands=mypy -p yacron2 --ignore-missing-imports


[testenv]
deps = -rrequirements_dev.txt
setenv =
    PYTHONPATH = {toxinidir}

commands = pytest --color=yes -vv
