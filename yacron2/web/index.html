<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<title>yacron2</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --panel-2: #fafbfc;
    --hover: #f3f4f7;
    --border: #e5e7eb;
    --border-strong: #d6dae0;
    --text: #161a1f;
    --muted: #6b7280;
    --faint: #9aa1ac;
    --accent: #4f46e5;
    --accent-text: #ffffff;
    --accent-weak: rgba(79, 70, 229, 0.10);
    --ok: #15a34a;
    --fail: #dc2626;
    --run: #2563eb;
    --pending: #d97706;
    --disabled: #9ca3af;
    --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 4px 16px rgba(16, 24, 40, 0.06);
    --shadow-lg: 0 12px 40px rgba(16, 24, 40, 0.18);
    --radius: 12px;
    --radius-sm: 8px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1b212b;
      --hover: #1d242e;
      --border: #2a313c;
      --border-strong: #3a424f;
      --text: #e7eaee;
      --muted: #9aa4b2;
      --faint: #6e7681;
      --accent: #7c83ff;
      --accent-text: #0d1117;
      --accent-weak: rgba(124, 131, 255, 0.14);
      --ok: #3fb950;
      --fail: #f85149;
      --run: #4493f8;
      --pending: #d29922;
      --disabled: #6e7681;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.6);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: color-mix(in srgb, var(--panel) 88%, transparent);
    backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #9b5cff));
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-weak);
  }
  .brand h1 { font-size: 17px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
  .brand .tag { font-size: 11.5px; color: var(--faint); margin-top: -2px; }
  .spacer { flex: 1; }

  .summary { display: flex; gap: 8px; align-items: center; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--border);
    font-size: 12px; color: var(--muted); white-space: nowrap;
  }
  .pill b { color: var(--text); font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.ok { background: var(--ok); }
  .dot.fail { background: var(--fail); }
  .dot.run { background: var(--run); }
  .dot.pending { background: var(--pending); }
  .dot.disabled { background: var(--disabled); }
  .dot.live { background: var(--ok); }
  .dot.run, .dot.live { box-shadow: 0 0 0 0 currentColor; animation: pulse 1.8s infinite; color: var(--run); }
  .dot.live { color: var(--ok); }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 color-mix(in srgb, currentColor 55%, transparent); }
    70% { box-shadow: 0 0 0 6px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  .icon-btn {
    display: inline-grid; place-items: center;
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all .12s ease;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); border-color: var(--border-strong); }
  .icon-btn svg { width: 17px; height: 17px; }
  .icon-btn.spin svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- layout ---------- */
  main { max-width: 1180px; margin: 0 auto; padding: 24px; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .search {
    flex: 1; max-width: 320px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: var(--radius-sm);
    background: var(--panel); border: 1px solid var(--border);
  }
  .search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }
  .search svg { width: 15px; height: 15px; color: var(--faint); flex: none; }
  .search input { border: 0; outline: 0; background: transparent; color: var(--text); width: 100%; font-size: 13.5px; }

  /* ---------- table ---------- */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    color: var(--faint); padding: 11px 16px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s ease; }
  tbody tr:last-child { border-bottom: 0; }
  tbody tr:hover { background: var(--hover); }
  tbody tr.active { background: var(--accent-weak); }
  td { padding: 13px 16px; vertical-align: middle; }

  .st { display: inline-flex; align-items: center; gap: 8px; font-weight: 550; white-space: nowrap; }
  .st .label { font-size: 13px; }
  .st.ok .label { color: var(--ok); }
  .st.fail .label { color: var(--fail); }
  .st.run .label { color: var(--run); }
  .st.pending .label { color: var(--pending); }
  .st.disabled .label { color: var(--disabled); }

  .jobname { font-weight: 600; color: var(--text); }
  .jobcmd { font-family: var(--mono); font-size: 11.5px; color: var(--faint); margin-top: 2px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip {
    display: inline-block; font-family: var(--mono); font-size: 12px;
    padding: 2px 8px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    white-space: nowrap;
  }
  .muted { color: var(--muted); }
  .faint { color: var(--faint); }
  .nowrap { white-space: nowrap; }
  .exit { font-family: var(--mono); font-size: 11px; padding: 1px 6px; border-radius: 5px; margin-left: 6px; }
  .exit.zero { color: var(--ok); background: color-mix(in srgb, var(--ok) 14%, transparent); }
  .exit.nonzero { color: var(--fail); background: color-mix(in srgb, var(--fail) 14%, transparent); }

  .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px; border-radius: var(--radius-sm); font-size: 12.5px; font-weight: 550;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    cursor: pointer; transition: all .12s ease; white-space: nowrap;
  }
  .btn:hover:not(:disabled) { background: var(--hover); border-color: var(--border-strong); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn svg { width: 14px; height: 14px; }
  .btn.primary { background: var(--accent); color: var(--accent-text); border-color: transparent; }
  .btn.primary:hover:not(:disabled) { filter: brightness(1.07); }
  .btn.ok { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 35%, var(--border)); }
  .btn.ok:hover:not(:disabled) { border-color: color-mix(in srgb, var(--ok) 55%, var(--border)); }

  .empty { padding: 56px 24px; text-align: center; color: var(--muted); }
  .empty svg { width: 40px; height: 40px; color: var(--faint); margin-bottom: 12px; }

  /* ---------- drawer ---------- */
  .scrim { position: fixed; inset: 0; background: rgba(8, 11, 16, 0.4); opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 40; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: min(720px, 94vw);
    background: var(--panel); border-left: 1px solid var(--border); box-shadow: var(--shadow-lg);
    transform: translateX(100%); transition: transform .24s cubic-bezier(.22,.61,.36,1);
    z-index: 50; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .drawer-head .row1 { display: flex; align-items: center; gap: 10px; }
  .drawer-head h2 { margin: 0; font-size: 16px; font-weight: 650; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .drawer-head .meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px 14px; font-size: 12px; color: var(--muted); }
  .drawer-head .meta b { color: var(--text); font-weight: 600; }
  .drawer-tools { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--panel-2); }
  .toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); cursor: pointer; user-select: none; }
  .toggle input { accent-color: var(--accent); }

  .term {
    flex: 1; margin: 0; overflow-y: auto; padding: 14px 18px;
    background: #0b0e14; color: #c9d1de;
    font-family: var(--mono); font-size: 12.5px; line-height: 1.65;
    white-space: pre-wrap; word-break: break-word;
  }
  .term.nowrap-mode { white-space: pre; word-break: normal; }
  .term .ln { display: block; }
  .term .ln.stderr { color: #ff9b9b; }
  .term .ln.sys { color: #6e7681; font-style: italic; }
  .term .ln .gut { color: #44505f; user-select: none; display: inline-block; min-width: 3.5ch; margin-right: 12px; text-align: right; }
  .term-empty { color: #6e7681; padding: 24px 4px; font-style: italic; }

  /* ---------- modal ---------- */
  .modal-wrap { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(8,11,16,.45); z-index: 60; opacity: 0; pointer-events: none; transition: opacity .15s ease; }
  .modal-wrap.open { opacity: 1; pointer-events: auto; }
  .modal { width: min(420px, 92vw); background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 22px; }
  .modal h3 { margin: 0 0 6px; font-size: 16px; }
  .modal p { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
  .modal input {
    width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    background: var(--panel-2); color: var(--text); font-size: 13.5px; font-family: var(--mono);
  }
  .modal input:focus { outline: 0; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  /* ---------- toasts ---------- */
  .toasts { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 70; align-items: center; }
  .toast {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 15px; border-radius: 10px; box-shadow: var(--shadow-lg);
    background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 13px;
    animation: rise .2s ease;
  }
  .toast svg { width: 16px; height: 16px; flex: none; }
  .toast.ok svg { color: var(--ok); }
  .toast.err svg { color: var(--fail); }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  @media (max-width: 760px) {
    main { padding: 14px; }
    .col-cmd, .col-sched, .col-dur, .col-next { display: none; }
    .summary .pill.opt { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="mark" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    </div>
    <div>
      <h1>yacron2</h1>
      <div class="tag">job dashboard</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="summary" id="summary"></div>
  <button class="icon-btn" id="refreshBtn" title="Refresh now" aria-label="Refresh now">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
  </button>
  <button class="btn" id="authBtn" title="Set access token" aria-label="Set access token">
    <svg id="authIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    <span id="authLabel">Set token</span>
  </button>
</header>

<main>
  <div class="toolbar">
    <label class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Filter jobs…" autocomplete="off" />
    </label>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Status</th>
          <th>Job</th>
          <th class="col-sched">Schedule</th>
          <th>Last run</th>
          <th class="col-dur">Duration</th>
          <th class="col-next">Next run</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <div id="emptyMsg">No jobs configured.</div>
    </div>
  </div>
</main>

<!-- drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <div class="row1">
      <span class="dot" id="dHealth"></span>
      <h2 id="dName">job</h2>
      <button class="icon-btn" id="dClose" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="meta" id="dMeta"></div>
  </div>
  <div class="drawer-tools">
    <button class="btn primary" id="dRun">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg> Run now
    </button>
    <label class="toggle"><input type="checkbox" id="dFollow" checked> Follow</label>
    <label class="toggle"><input type="checkbox" id="dWrap" checked> Wrap</label>
    <div class="spacer"></div>
    <button class="btn" id="dClear">Clear</button>
  </div>
  <pre class="term" id="term"></pre>
</aside>

<!-- token modal -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <h3 id="modalTitle">Access token required</h3>
    <p id="modalMsg">This yacron2 instance requires a bearer token. It is stored only in this browser tab.</p>
    <input id="tokenInput" type="password" placeholder="Paste token…" />
    <div class="modal-actions">
      <button class="btn" id="tokenClear" style="margin-right:auto">Clear</button>
      <button class="btn" id="tokenCancel">Cancel</button>
      <button class="btn primary" id="tokenSave">Save</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
"use strict";
(function () {
  const TOKEN_KEY = "yacron2_token";
  const POLL_MS = 3000;

  const $ = (id) => document.getElementById(id);
  const state = {
    jobs: [],
    fetchedAt: 0,      // performance.now() at last successful /jobs load
    filter: "",
    drawerJob: null,
    follow: true,
    stream: null,      // AbortController for the active log stream
  };

  // ---------- auth-aware fetch ----------
  function token() { return sessionStorage.getItem(TOKEN_KEY) || ""; }
  function updateAuthBtn() {
    const has = !!token();
    $("authLabel").textContent = has ? "Token set" : "Set token";
    $("authBtn").title = has ? "Access token set — click to change or clear" : "Set access token";
    $("authBtn").classList.toggle("ok", has);
    // open padlock when no token, closed when set
    $("authIcon").innerHTML = has
      ? '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'
      : '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.5-1.8"/>';
  }
  function authHeaders(extra) {
    const h = Object.assign({}, extra || {});
    const t = token();
    if (t) h["Authorization"] = "Bearer " + t;
    return h;
  }
  async function apiFetch(path, opts) {
    opts = opts || {};
    opts.headers = authHeaders(opts.headers);
    const res = await fetch(path, opts);
    if (res.status === 401) {
      openModal({ required: true });
      throw new Error("unauthorized");
    }
    return res;
  }

  // ---------- formatting ----------
  function fmtAgo(iso) {
    if (!iso) return "never";
    const s = (Date.now() - new Date(iso).getTime()) / 1000;
    if (s < 2) return "just now";
    if (s < 60) return Math.floor(s) + "s ago";
    if (s < 3600) return Math.floor(s / 60) + "m ago";
    if (s < 86400) return Math.floor(s / 3600) + "h ago";
    return Math.floor(s / 86400) + "d ago";
  }
  function fmtDuration(sec) {
    if (sec == null) return "—";
    if (sec < 1) return Math.round(sec * 1000) + "ms";
    if (sec < 60) return (sec < 10 ? sec.toFixed(2) : sec.toFixed(1)) + "s";
    const m = Math.floor(sec / 60), s = Math.round(sec % 60);
    if (m < 60) return m + "m " + s + "s";
    const h = Math.floor(m / 60);
    return h + "h " + (m % 60) + "m";
  }
  function fmtIn(sec) {
    if (sec == null) return "—";
    if (sec <= 0) return "now";
    if (sec < 60) return "in " + Math.floor(sec) + "s";
    if (sec < 3600) return "in " + Math.floor(sec / 60) + "m";
    if (sec < 172800) return "in " + Math.floor(sec / 3600) + "h";
    return "in " + Math.floor(sec / 86400) + "d";
  }
  function nextRunSeconds(job) {
    if (job.scheduled_in == null) return null;
    const elapsed = (performance.now() - state.fetchedAt) / 1000;
    return job.scheduled_in - elapsed;
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
  }

  // health: a single semantic state per job
  function health(job) {
    if (!job.enabled) return { key: "disabled", label: "Disabled" };
    if (job.running) return { key: "run", label: "Running" };
    if (job.last_run) return job.last_run.outcome === "failure"
      ? { key: "fail", label: "Failed" }
      : { key: "ok", label: "OK" };
    return { key: "pending", label: "Pending" };
  }

  // ---------- rendering ----------
  function renderSummary() {
    const total = state.jobs.length;
    const running = state.jobs.filter((j) => j.running).length;
    const failing = state.jobs.filter((j) => !j.running && j.enabled && j.last_run && j.last_run.outcome === "failure").length;
    $("summary").innerHTML =
      '<span class="pill"><span class="dot ' + (running ? "run" : "live") + '"></span><b>' + total + '</b>&nbsp;jobs</span>' +
      '<span class="pill opt"><span class="dot run"></span><b>' + running + '</b>&nbsp;running</span>' +
      '<span class="pill opt"><span class="dot ' + (failing ? "fail" : "ok") + '"></span><b>' + failing + '</b>&nbsp;failing</span>';
  }

  function renderRows() {
    const tbody = $("rows");
    const f = state.filter.toLowerCase();
    const jobs = state.jobs.filter((j) => !f || j.name.toLowerCase().includes(f) || j.command.toLowerCase().includes(f));

    $("emptyState").style.display = jobs.length ? "none" : "block";
    $("emptyMsg").textContent = state.jobs.length ? "No jobs match your filter." : "No jobs configured.";

    tbody.innerHTML = jobs.map((job) => {
      const h = health(job);
      const lr = job.last_run;
      let last = '<span class="faint">never</span>';
      if (lr) {
        const code = lr.exit_code;
        const exitCls = code === 0 ? "zero" : "nonzero";
        const exit = code == null ? "" : '<span class="exit ' + exitCls + '">exit ' + esc(code) + "</span>";
        last = '<span class="nowrap" data-ago="' + esc(lr.finished_at) + '">' + fmtAgo(lr.finished_at) + "</span>" + exit;
      }
      const nsec = nextRunSeconds(job);
      const next = job.running
        ? '<span class="faint">—</span>'
        : (!job.enabled ? '<span class="faint">—</span>' : '<span class="nowrap" data-next="' + job.name + '">' + fmtIn(nsec) + "</span>");

      return (
        '<tr data-job="' + esc(job.name) + '"' + (state.drawerJob === job.name ? ' class="active"' : "") + ">" +
          '<td><span class="st ' + h.key + '"><span class="dot ' + h.key + '"></span><span class="label">' + h.label + "</span></span></td>" +
          '<td><div class="jobname">' + esc(job.name) + "</div>" +
              '<div class="jobcmd" title="' + esc(job.command) + '">' + esc(job.command) + "</div></td>" +
          '<td class="col-sched"><span class="chip">' + esc(job.schedule) + "</span></td>" +
          '<td>' + last + "</td>" +
          '<td class="col-dur muted nowrap">' + (lr ? fmtDuration(lr.duration) : "—") + "</td>" +
          '<td class="col-next muted nowrap">' + next + "</td>" +
          '<td><div class="actions">' +
            '<button class="btn run-btn" data-run="' + esc(job.name) + '"' + (job.enabled ? "" : ' disabled title="job is disabled"') +
              '><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>Run</button>' +
            '<button class="btn logs-btn" data-logs="' + esc(job.name) + '">Logs</button>' +
          '</div></td>' +
        "</tr>"
      );
    }).join("");
  }

  // lightweight per-second update of relative/countdown cells (no full rerender)
  function tick() {
    document.querySelectorAll("[data-ago]").forEach((el) => { el.textContent = fmtAgo(el.getAttribute("data-ago")); });
    document.querySelectorAll("[data-next]").forEach((el) => {
      const job = state.jobs.find((j) => j.name === el.getAttribute("data-next"));
      if (job) el.textContent = fmtIn(nextRunSeconds(job));
    });
  }

  // ---------- data ----------
  let refreshing = false;
  async function loadJobs() {
    if (refreshing) return;
    refreshing = true;
    $("refreshBtn").classList.add("spin");
    try {
      const res = await apiFetch("/jobs");
      if (!res.ok) throw new Error("HTTP " + res.status);
      state.jobs = await res.json();
      state.fetchedAt = performance.now();
      renderSummary();
      renderRows();
      if (state.drawerJob) renderDrawerMeta();
    } catch (e) {
      if (e.message !== "unauthorized") console.warn("loadJobs failed:", e);
    } finally {
      refreshing = false;
      $("refreshBtn").classList.remove("spin");
    }
  }

  async function runJob(name) {
    try {
      const res = await apiFetch("/jobs/" + encodeURIComponent(name) + "/start", { method: "POST" });
      if (res.ok) {
        toast("ok", "Started “" + name + "”");
        // if its drawer is open, follow the fresh run from the top
        if (state.drawerJob === name) { setTimeout(() => startStream(name, true), 250); }
        setTimeout(loadJobs, 300);
      } else if (res.status === 409) {
        toast("err", "“" + name + "” is disabled");
      } else {
        toast("err", "Could not start (HTTP " + res.status + ")");
      }
    } catch (e) {
      if (e.message !== "unauthorized") toast("err", "Could not start “" + name + "”");
    }
  }

  // ---------- drawer + live logs ----------
  function openDrawer(name) {
    state.drawerJob = name;
    $("drawer").classList.add("open");
    $("drawer").setAttribute("aria-hidden", "false");
    $("scrim").classList.add("open");
    $("dName").textContent = name;
    renderDrawerMeta();
    renderRows();
    startStream(name, true);
  }
  function closeDrawer() {
    stopStream();
    state.drawerJob = null;
    $("drawer").classList.remove("open");
    $("drawer").setAttribute("aria-hidden", "true");
    $("scrim").classList.remove("open");
    renderRows();
  }
  function renderDrawerMeta() {
    const job = state.jobs.find((j) => j.name === state.drawerJob);
    if (!job) return;
    const h = health(job);
    $("dHealth").className = "dot " + h.key;
    const lr = job.last_run;
    const caps = [];
    if (!job.captureStdout) caps.push("stdout off");
    if (!job.captureStderr) caps.push("stderr off");
    const parts = [
      "<span><b>" + h.label + "</b></span>",
      '<span>schedule <b>' + esc(job.schedule) + "</b></span>",
    ];
    if (lr) {
      parts.push("<span>last " + fmtAgo(lr.finished_at) + (lr.exit_code == null ? "" : " · exit " + esc(lr.exit_code)) + "</span>");
      if (lr.duration != null) parts.push("<span>took " + fmtDuration(lr.duration) + "</span>");
    }
    if (caps.length) parts.push('<span class="faint">capture: ' + caps.join(", ") + "</span>");
    $("dMeta").innerHTML = parts.join("");
  }

  function termEl() { return $("term"); }
  function clearTerm() { termEl().innerHTML = ""; }
  function appendLine(stream, text, kind) {
    const t = termEl();
    const atBottom = t.scrollHeight - t.scrollTop - t.clientHeight < 40;
    const div = document.createElement("span");
    div.className = "ln " + (kind || stream || "");
    div.textContent = text;
    t.appendChild(div);
    if (state.follow && (atBottom || kind === "sys")) t.scrollTop = t.scrollHeight;
  }

  function stopStream() {
    if (state.stream) { state.stream.abort(); state.stream = null; }
  }

  async function startStream(name, clear) {
    stopStream();
    if (clear) clearTerm();
    const job = state.jobs.find((j) => j.name === name);
    if (job && !job.captureStdout && !job.captureStderr) {
      appendLine("", "This job does not capture stdout or stderr — no logs to display. Enable captureStdout / captureStderr in its config.", "sys");
      return;
    }
    const ctrl = new AbortController();
    state.stream = ctrl;
    let gotLine = false;
    try {
      const res = await apiFetch("/jobs/" + encodeURIComponent(name) + "/logs", { signal: ctrl.signal });
      if (!res.ok || !res.body) { appendLine("", "Could not open log stream (HTTP " + res.status + ").", "sys"); return; }
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf("\n\n")) >= 0) {
          const block = buf.slice(0, idx);
          buf = buf.slice(idx + 2);
          let ev = "message", data = "";
          block.split("\n").forEach((ln) => {
            if (ln.startsWith(":")) return;            // keep-alive comment
            if (ln.startsWith("event:")) ev = ln.slice(6).trim();
            else if (ln.startsWith("data:")) data += ln.slice(5).trim();
          });
          if (ev === "line" && data) {
            try {
              const o = JSON.parse(data);
              gotLine = true;
              appendLine(o.stream, o.line, o.stream);
            } catch (_) { /* ignore malformed */ }
          } else if (ev === "end") {
            if (!gotLine) appendLine("", "(no output captured for the latest run)", "sys");
          }
        }
      }
    } catch (e) {
      if (e.name !== "AbortError" && e.message !== "unauthorized") {
        appendLine("", "Log stream ended: " + e.message, "sys");
      }
    } finally {
      if (state.stream === ctrl) state.stream = null;
    }
  }

  // ---------- modal ----------
  function openModal(opts) {
    opts = opts || {};
    const wrap = $("modalWrap");
    // don't clobber what the user is typing if a background poll re-triggers
    // this while the modal is already open
    if (wrap.classList.contains("open")) return;
    const has = !!token();
    if (opts.required) {
      $("modalTitle").textContent = "Access token required";
      $("modalMsg").textContent = "This yacron2 instance requires a bearer token. It is stored only in this browser tab.";
    } else {
      $("modalTitle").textContent = has ? "Update access token" : "Set access token";
      $("modalMsg").textContent = "Stored only in this browser tab and sent as a bearer token with each request.";
    }
    $("tokenClear").style.display = has ? "" : "none";
    wrap.classList.add("open");
    $("tokenInput").value = token();
    setTimeout(() => $("tokenInput").focus(), 50);
  }
  function closeModal() { $("modalWrap").classList.remove("open"); }

  // ---------- toasts ----------
  function toast(kind, msg) {
    const el = document.createElement("div");
    el.className = "toast " + kind;
    const icon = kind === "ok"
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
    el.innerHTML = icon + "<span>" + esc(msg) + "</span>";
    $("toasts").appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity .3s"; setTimeout(() => el.remove(), 300); }, 3200);
  }

  // ---------- events ----------
  $("rows").addEventListener("click", (e) => {
    const runBtn = e.target.closest("[data-run]");
    if (runBtn) { e.stopPropagation(); if (!runBtn.disabled) runJob(runBtn.getAttribute("data-run")); return; }
    const logsBtn = e.target.closest("[data-logs]");
    if (logsBtn) { e.stopPropagation(); openDrawer(logsBtn.getAttribute("data-logs")); return; }
    const tr = e.target.closest("tr[data-job]");
    if (tr) openDrawer(tr.getAttribute("data-job"));
  });
  $("search").addEventListener("input", (e) => { state.filter = e.target.value; renderRows(); });
  $("refreshBtn").addEventListener("click", loadJobs);
  $("authBtn").addEventListener("click", () => openModal());
  $("dClose").addEventListener("click", closeDrawer);
  $("scrim").addEventListener("click", closeDrawer);
  $("dRun").addEventListener("click", () => { if (state.drawerJob) runJob(state.drawerJob); });
  $("dClear").addEventListener("click", clearTerm);
  $("dFollow").addEventListener("change", (e) => { state.follow = e.target.checked; if (state.follow) termEl().scrollTop = termEl().scrollHeight; });
  $("dWrap").addEventListener("change", (e) => { termEl().classList.toggle("nowrap-mode", !e.target.checked); });
  $("tokenSave").addEventListener("click", () => {
    const v = $("tokenInput").value.trim();
    if (v) sessionStorage.setItem(TOKEN_KEY, v); else sessionStorage.removeItem(TOKEN_KEY);
    updateAuthBtn();
    closeModal(); loadJobs();
  });
  $("tokenClear").addEventListener("click", () => {
    sessionStorage.removeItem(TOKEN_KEY);
    updateAuthBtn();
    closeModal(); loadJobs();
  });
  $("tokenCancel").addEventListener("click", closeModal);
  $("tokenInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("tokenSave").click(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { if ($("modalWrap").classList.contains("open")) closeModal(); else if (state.drawerJob) closeDrawer(); }
  });

  // ---------- boot ----------
  updateAuthBtn();
  loadJobs();
  setInterval(loadJobs, POLL_MS);
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
